<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nahan Multi-Installer | نصب‌کننده گروهی نهان</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
--text:#e0e0ec;--text2:#8888a0;--text3:#55556a;
--cyan:#e53935;--cyan2:#c62828;--cyan-bg:rgba(229,57,53,.12);
--green:#00e676;--green-bg:rgba(0,230,118,.08);
--red:#ff4466;--red-bg:rgba(255,68,102,.08);
--yellow:#ffaa00;--yellow-bg:rgba(255,170,0,.08);
--purple:#e53935;
--border:#2a2a40;--border2:#3a3a55;
--radius:10px;--radius2:14px;
--shadow:0 4px 24px rgba(0,0,0,.4);
--font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
--font-mono:'SF Mono','Cascadia Code','Fira Code',monospace;
--transition:all .25s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px}
body{
font-family:var(--font);background:var(--bg);color:var(--text);
min-height:100vh;display:flex;flex-direction:column;align-items:center;
line-height:1.7;-webkit-font-smoothing:antialiased;
}

.container{width:100%;max-width:720px;padding:24px 20px 48px}

/* ── Header ── */
.header{text-align:center;margin-bottom:32px}
.logo{font-size:2.4rem;font-weight:800;letter-spacing:4px;
color:var(--cyan);margin-bottom:4px}
.logo-sub{color:var(--text2);font-size:.85rem;font-weight:400}

/* ── Steps Indicator ── */
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:32px}
.step-dot{
width:10px;height:10px;border-radius:50%;background:var(--bg4);
border:2px solid var(--border2);transition:var(--transition);
}
.step-dot.active{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,.4)}
.step-dot.done{background:var(--green);border-color:var(--green)}

/* ── Card ── */
.card{
background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);
padding:32px;box-shadow:var(--shadow);transition:var(--transition);
animation:fadeIn .35s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.card-title{font-size:1.35rem;font-weight:700;margin-bottom:6px;color:var(--cyan)}
.card-subtitle{color:var(--text2);font-size:.9rem;margin-bottom:24px}

/* ── Form Elements ── */
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:.85rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input{
width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);
border-radius:var(--radius);color:var(--text);font-size:.95rem;
font-family:var(--font-mono);transition:var(--transition);outline:none
}
.form-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:100px;font-family:var(--font-mono)}
.form-hint{font-size:.78rem;color:var(--text3);margin-top:4px}

/* ── Buttons ── */
.btn{
display:inline-flex;align-items:center;justify-content:center;gap:8px;
padding:12px 28px;border-radius:var(--radius);font-size:.95rem;
font-weight:600;cursor:pointer;border:none;transition:var(--transition);
font-family:var(--font)
}
.btn-primary{background:var(--cyan);color:#fff;box-shadow:0 2px 12px rgba(229,57,53,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,212,255,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-group{display:flex;gap:12px;margin-top:28px}
.btn-sm{padding:8px 18px;font-size:.85rem}

/* ── Alerts ── */
.alert{
padding:14px 18px;border-radius:var(--radius);font-size:.88rem;
margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;line-height:1.6
}
.alert-info{background:var(--cyan-bg);border:1px solid rgba(0,212,255,.2);color:var(--cyan)}
.alert-success{background:var(--green-bg);border:1px solid rgba(0,230,118,.2);color:var(--green)}
.alert-error{background:var(--red-bg);border:1px solid rgba(255,68,102,.2);color:var(--red)}
.alert-warn{background:var(--yellow-bg);border:1px solid rgba(255,170,0,.2);color:var(--yellow)}
.alert-icon{font-size:1.1rem;flex-shrink:0;line-height:1.5}

/* ── Progress ── */
.progress-list{list-style:none;margin:8px 0}
.progress-item{
display:flex;align-items:center;gap:12px;padding:12px 16px;
border-radius:var(--radius);margin-bottom:8px;
background:var(--bg3);border:1px solid var(--border);
transition:var(--transition)
}
.progress-item.active{border-color:var(--cyan);background:var(--cyan-bg)}
.progress-item.done{border-color:var(--green);background:var(--green-bg)}
.progress-item.error{border-color:var(--red);background:var(--red-bg)}
.progress-item.waiting{opacity:.5}
.progress-icon{font-size:1.1rem;flex-shrink:0;width:24px;text-align:center}
.progress-text{flex:1;font-size:.9rem}
.progress-detail{font-size:.78rem;color:var(--text2);margin-top:2px}

/* ── Spinner ── */
.spinner{
width:18px;height:18px;border:2px solid var(--border2);
border-top-color:var(--cyan);border-radius:50%;
animation:spin .8s linear infinite;flex-shrink:0
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Result Card ── */
.result-box{
background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
padding:16px;margin-bottom:12px
}
.result-label{font-size:.8rem;color:var(--text2);margin-bottom:4px}
.result-value{
font-family:var(--font-mono);font-size:1.05rem;color:var(--cyan);
word-break:break-all;display:flex;align-items:center;gap:10px
}
.copy-btn{
background:var(--bg4);border:1px solid var(--border);color:var(--text2);
padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;
transition:var(--transition);flex-shrink:0
}
.copy-btn:hover{color:var(--cyan);border-color:var(--cyan)}
.copy-btn.copied{color:var(--green);border-color:var(--green)}

/* ── Extra Elements ── */
.conn-status{display:flex;align-items:center;gap:12px;padding:16px 20px;border-radius:var(--radius);margin:16px 0;font-size:.95rem}
.conn-testing{background:var(--cyan-bg);border:1px solid rgba(0,212,255,.2)}
.conn-ok{background:var(--green-bg);border:1px solid rgba(0,230,118,.2)}
.conn-fail{background:var(--red-bg);border:1px solid rgba(255,68,102,.2)}

.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.feature-item{
display:flex;align-items:center;gap:10px;padding:12px 14px;
background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
font-size:.88rem;transition:var(--transition)
}
.feature-item:hover{border-color:var(--cyan);background:var(--cyan-bg)}

.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:520px){.config-grid{grid-template-columns:1fr}}
.divider{height:1px;background:var(--border);margin:20px 0}

.code-block{
background:#0d0d14;border:1px solid var(--border);border-radius:var(--radius);
padding:14px 18px;font-family:var(--font-mono);font-size:.85rem;
color:var(--purple);overflow-x:auto;margin:12px 0;line-height:1.6;
direction:ltr;text-align:left;position:relative
}
.steps-list{list-style:none;counter-reset:step;margin:16px 0}
.steps-list li{
counter-increment:step;padding:10px 44px 10px 14px;position:relative;
font-size:.9rem;color:var(--text2);margin-bottom:6px;
background:var(--bg3);border-radius:8px;line-height:1.5
}
.steps-list li::before{
content:counter(step);position:absolute;right:14px;top:10px;
width:22px;height:22px;border-radius:50%;background:var(--cyan-bg);
color:var(--cyan);font-size:.78rem;font-weight:700;
display:flex;align-items:center;justify-content:center
}
.steps-list a{color:var(--cyan); text-decoration: none;}
</style>
</head>
<body>

<div class="container">
<div class="header">
<div class="logo">NAHAN</div>
<div class="logo-sub">نصب‌کننده گروهی (Multi-Token) — نسخه ۲.۰</div>
</div>

<div class="steps" id="stepsIndicator"></div>

<div id="stepContent"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  STATE MANAGEMENT
// ══════════════════════════════════════════════════════════
const totalSteps = 6;
let currentStep = 0;
const DEFAULT_PROXY_URL = 'https://nahan-installer.edge1-erpy.workers.dev';

const state = {
  // Cloudflare API connection
  proxyUrl: localStorage.getItem('nahan_proxy_url') || '',
  directApiOk: null,

  // Batch Deployment Data
  rawTokensInput: '',
  accountsList: [], // { token, accountId, accountName }
  deployedPanels: [], // { url, accountName }

  // Global Configuration
  workerName: 'nahan-core',
  dbName: 'iot_db',
  password: '',
  apiRoute: 'sync',
  tgToken: '',
  tgAdminId: '',
  
  // Worker Source
  workerCode: '',
  workerVersion: '',
};

// ══════════════════════════════════════════════════════════
//  CLOUDFLARE API ENGINE
// ══════════════════════════════════════════════════════════
const CF_API = 'https://api.cloudflare.com/client/v4';

async function cfFetch(path, token, options = {}) {
  const method = options.method || 'GET';
  const proxy = state.proxyUrl;
  
  let url = proxy ? `${proxy}${path}` : `${CF_API}${path}`;
  
  const headers = {
    'Authorization': `Bearer ${token}`,
    ...options.headers,
  };
  
  if (proxy) headers['X-Proxy-Target'] = path;
  if (options.body && !(options.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }

  try {
    const res = await fetch(url, { ...options, headers });
    const text = await res.text();
    let json;
    try {
      json = JSON.parse(text);
    } catch(e) {
      return { success: false, errors: [{ message: 'پاسخ دریافتی معتبر نیست (احتمالاً فیلترشکن نیاز است).' }] };
    }
    return json;
  } catch (e) {
    if (e.name === 'TypeError' && e.message.includes('fetch')) {
       return { success: false, errors: [{ message: 'دسترسی مستقیم مرورگر به API کلودفلر مسدود شده است (خطای CORS).' }] };
    }
    return { success: false, errors: [{ message: `خطای شبکه: ${e.message}` }] };
  }
}

async function testDirectApi() {
  try {
    const res = await fetch(`${CF_API}/accounts`, { method: 'GET', headers: { 'Authorization': 'Bearer test' } });
    return (res.status === 401 || res.status === 200 || res.status === 403);
  } catch (e) {
    return false;
  }
}

async function fetchAccountsForToken(token) {
  const r = await cfFetch('/accounts', token);
  if (r.success && Array.isArray(r.result)) {
    return { ok: true, accounts: r.result };
  }
  const errMsg = r.errors?.[0]?.message || '';
  if (errMsg.includes('Authentication error') || errMsg.includes('Invalid access token')) {
    return { ok: false, msg: 'توکن نامعتبر است یا دسترسی Account Read ندارد' };
  }
  return { ok: false, msg: errMsg || 'خطا در اعتبارسنجی توکن' };
}

// ══════════════════════════════════════════════════════════
//  CORE WORKER FUNCTIONS
// ══════════════════════════════════════════════════════════
async function fetchWorkerCode() {
  if (state.workerCode) return { ok: true };

  const sources = state.proxyUrl 
    ? [ { name: 'Proxy → GitHub', url: `${state.proxyUrl}/github`, viaProxy: true, githubUrl: 'https://raw.githubusercontent.com/itsyebekhe/nahan/refs/heads/main/_worker.js' } ]
    : [ { name: 'jsDelivr CDN', url: 'https://cdn.jsdelivr.net/gh/itsyebekhe/nahan@main/_worker.js' },
        { name: 'GitHub Raw',    url: 'https://raw.githubusercontent.com/itsyebekhe/nahan/refs/heads/main/_worker.js' } ];

  for (const src of sources) {
    try {
      const fetchOpts = src.viaProxy ? { headers: { 'X-GitHub-Url': src.githubUrl } } : {};
      const res = await fetch(src.url, fetchOpts);
      if (!res.ok) continue;

      state.workerCode = await res.text();
      const verMatch = state.workerCode.match(/const\s+CURRENT_VERSION\s*=\s*["']([^"']+)["']/);
      state.workerVersion = verMatch ? verMatch[1] : '';
      return { ok: true };
    } catch (e) { console.error(e); }
  }
  return { ok: false, msg: 'خطا در دریافت سورس کد از گیت‌هاب' };
}

async function deployToAccount(accountIndex, token, accountId) {
  // Step 1: Create D1 Database
  setProgress('prog-d1', 'active');
  let dbId = '';
  const d1Res = await cfFetch(`/accounts/${accountId}/d1/database`, token, {
    method: 'POST', body: JSON.stringify({ name: state.dbName })
  });
  if (d1Res.success) {
    dbId = d1Res.result?.uuid || d1Res.result?.database_id || '';
  } else {
    // Check if exists
    const check = await cfFetch(`/accounts/${accountId}/d1/database`, token);
    if (check.success && Array.isArray(check.result)) {
      const db = check.result.find(d => d.name === state.dbName);
      if (db) dbId = db.uuid || db.database_id || '';
    }
    if (!dbId) return { ok: false, step: 'd1', msg: d1Res.errors?.[0]?.message || 'خطا در ساخت دیتابیس D1' };
  }
  setProgress('prog-d1', 'done');

  // Step 2: Prepare Code & Deploy
  setProgress('prog-deploy', 'active');
  let code = state.workerCode;
  
  if (state.password && state.password !== 'admin') {
    code = code.replace(/masterKey\s*[=:]\s*['"]admin['"]/g, `masterKey: '${state.password}'`);
    code = code.replace(/MASTER_KEY\s*=\s*['"]admin['"]/g, `MASTER_KEY = '${state.password}'`);
    code = code.replace(/['"]admin['"]\s*\/\/\s*default\s*password/gi, `'${state.password}' // custom password`);
    code = code.replace(/password\s*[=:]\s*['"]admin['"]/g, `password: '${state.password}'`);
  }
  code = code.replace(/cfWorkerName\s*:\s*['"][^'"]*['"]/g, `cfWorkerName: "${state.workerName}"`);
  code = code.replace(/cfAccountId\s*:\s*['"][^'"]*['"]/g, `cfAccountId: "${accountId}"`);
  code = code.replace(/cfApiToken\s*:\s*['"][^'"]*['"]/g, `cfApiToken: "${token}"`);
  code = code.replace(/apiRoute\s*:\s*['"][^'"]*['"]/g, `apiRoute: "${state.apiRoute}"`);
  if (state.tgToken) code = code.replace(/tgToken\s*:\s*['"][^'"]*['"]/g, `tgToken: "${state.tgToken}"`);
  if (state.tgAdminId) code = code.replace(/tgAdminId\s*:\s*['"][^'"]*['"]/g, `tgAdminId: "${state.tgAdminId}"`);
  
  const metadata = {
    main_module: 'worker.js',
    compatibility_date: '2024-09-22',
    compatibility_flags: ['nodejs_compat'],
    bindings: [{ name: 'IOT_DB', type: 'd1', id: dbId }]
  };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('worker.js', new Blob([code], { type: 'application/javascript+module' }), 'worker.js');

  const deployPath = `/accounts/${accountId}/workers/scripts/${encodeURIComponent(state.workerName)}`;
  const uploadRes = await cfFetch(deployPath, token, { method: 'PUT', body: form });
  if (!uploadRes.success) return { ok: false, step: 'deploy', msg: uploadRes.errors?.[0]?.message };

  await cfFetch(`${deployPath}/deployments`, token, {
    method: 'POST', body: JSON.stringify({ strategy: 'simple', manifest: { 'worker.js': { file: 'worker.js' } } })
  });
  setProgress('prog-deploy', 'done');

  // Step 3: Enable workers.dev and verify
  setProgress('prog-verify', 'active');
  await cfFetch(`/accounts/${accountId}/workers/services/${encodeURIComponent(state.workerName)}/environments/production/subdomain`, token, {
    method: 'POST', body: JSON.stringify({ enabled: true })
  });

  const subRes = await cfFetch(`/accounts/${accountId}/workers/subdomain`, token);
  if (subRes.success && subRes.result?.subdomain) {
    const url = `https://${state.workerName}.${subRes.result.subdomain}.workers.dev`;
    setProgress('prog-verify', 'done');
    return { ok: true, url };
  }
  
  return { ok: false, step: 'verify', msg: 'خطا در فعال‌سازی زیردامنه workers.dev' };
}

// ══════════════════════════════════════════════════════════
//  STEP RENDERERS
// ══════════════════════════════════════════════════════════
function renderStepsIndicator() {
  let html = '';
  for (let i = 0; i < totalSteps; i++) {
    let cls = 'step-dot';
    if (i === currentStep) cls += ' active';
    else if (i < currentStep) cls += ' done';
    html += `<div class="${cls}"></div>`;
  }
  document.getElementById('stepsIndicator').innerHTML = html;
}

function renderStep() {
  renderStepsIndicator();
  const el = document.getElementById('stepContent');
  switch (currentStep) {
    case 0: el.innerHTML = renderWelcome(); break;
    case 1: el.innerHTML = renderConnTest(); runConnectivityTest(); break;
    case 2: el.innerHTML = renderCredentials(); break;
    case 3: el.innerHTML = renderConfig(); break;
    case 4: el.innerHTML = renderDeploy(); runDeployment(); break;
    case 5: el.innerHTML = renderSuccess(); break;
  }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function alert(type, msg) {
  const icons = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
  return `<div class="alert alert-${type}"><span class="alert-icon">${icons[type]}</span><span>${esc(msg)}</span></div>`;
}

function goStep(n) { currentStep = n; renderStep(); }

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'کپی شد!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  });
}

function resetAll() {
  state.rawTokensInput = '';
  state.accountsList = [];
  state.deployedPanels = [];
  goStep(0);
}

// ── UI STEPS ──

function renderWelcome() {
  return `
<div class="card step-panel">
  <div class="card-title">به نصب‌کننده گروهی نهان خوش آمدید</div>
  <div class="card-subtitle">استقرار همزمان گیت‌وی نهان روی چندین حساب Cloudflare</div>
  <p style="color:var(--text2);font-size:.9rem;margin-bottom:20px">
    این ابزار برای راه‌اندازی پروکسی روی چند اکانت به صورت گروهی (Load Balancing) طراحی شده تا به راحتی سقف محدودیت درخواست‌های رایگان کلودفلر را افزایش دهید.
  </p>
  <div style="margin-bottom:20px">
    <div style="font-weight:600;margin-bottom:10px;font-size:.95rem">چه چیزی در هر اکانت ساخته می‌شود؟</div>
    <div class="feature-grid">
      <div class="feature-item"><span class="feature-icon">🗄️</span><span>پایگاه داده D1 اختصاصی</span></div>
      <div class="feature-item"><span class="feature-icon">⚡</span><span>Cloudflare Worker</span></div>
      <div class="feature-item"><span class="feature-icon">🔗</span><span>اتصال خودکار D1</span></div>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="goStep(1)">شروع کنیم</button>
  </div>
</div>`;
}

function renderConnTest() {
  return `
<div class="card step-panel">
  <div class="card-title">بررسی ارتباط سرور</div>
  <div class="conn-status conn-testing" id="connStatus">
    <div class="spinner"></div><span>در حال آزمایش اتصال به Cloudflare...</span>
  </div>
  
  <div id="proxyButtons" style="display:none;margin:20px 0">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:.9rem;color:var(--text2);margin-bottom:12px">
        اتصال مستقیم از مرورگر مسدود است (CORS). یکی از روش‌های زیر را انتخاب کنید:
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="connectDefaultProxy()" style="min-width:180px">
          ⚡ <span>استفاده از پروکسی پیش‌فرض</span>
        </button>
        <button class="btn btn-secondary" onclick="showCustomProxyForm()" style="min-width:180px">
          🔧 <span>استفاده از پروکسی شخصی</span>
        </button>
      </div>
    </div>
  </div>

  <div id="customProxyForm" style="display:none;margin-top:16px">
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
      <div style="font-weight:600;margin-bottom:8px;color:var(--cyan)">پروکسی شخصی</div>
      <div style="font-size:.85rem;color:var(--text2);margin-bottom:12px">آدرس Worker پروکسی خود را وارد کنید</div>
      <input type="text" class="form-input" id="inpCustomProxy" placeholder="https://my-proxy.workers.dev" style="direction:ltr;text-align:left;margin-bottom:10px">
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary btn-sm" onclick="connectCustomProxy()" id="btnCustomConnect">اتصال و نصب</button>

const PROXY_CODE = `// Nahan Installer Proxy Worker
const CORS = {
  'Access-Control-Allow-Origin': '*',
  'Access-Control-Allow-Methods': 'GET, POST, PUT, DELETE, OPTIONS',
  'Access-Control-Allow-Headers': 'Content-Type, Authorization, X-Proxy-Target, X-GitHub-Url',
  'Access-Control-Max-Age': '86400',
};
const jsonResp = (d, s = 200) => new Response(JSON.stringify(d), { status: s, headers: { 'Content-Type': 'application/json', ...CORS } });

export default {
  async fetch(request) {
    if (request.method === 'OPTIONS') return new Response(null, { status: 204, headers: CORS });
    const url = new URL(request.url);
    if (url.pathname === '/health') return jsonResp({ ok: true });
    if (url.pathname === '/github') {
      try {
        const r = await fetch(request.headers.get('X-GitHub-Url'));
        return new Response(await r.text(), { status: r.status, headers: { 'Content-Type': 'application/javascript', ...CORS } });
      } catch (e) { return jsonResp({ error: e.message }, 502); }
    }
    try {
      const cfUrl = 'https://api.cloudflare.com/client/v4' + request.headers.get('X-Proxy-Target');
      const opts = { method: request.method, headers: { Authorization: request.headers.get('Authorization') } };
      if (request.method !== 'GET' && request.method !== 'HEAD') {
        const ct = request.headers.get('Content-Type') || '';
        if (ct.includes('multipart/form-data')) { opts.body = await request.formData(); }
        else { opts.body = await request.text(); opts.headers['Content-Type'] = 'application/json'; }
      }
      const resp = await fetch(cfUrl, opts);
      return new Response(await resp.text(), { status: resp.status, headers: { 'Content-Type': 'application/json', ...CORS } });
    } catch (e) { return jsonResp({ error: e.message }, 502); }
  },
};`;

async function runConnectivityTest() {
  const statusEl = document.getElementById('connStatus');
  const resultEl = document.getElementById('connResult');
  const proxyBtns = document.getElementById('proxyButtons');
  
  // 1. Check saved custom proxy
  if (state.proxyUrl) {
    try {
      const r = await fetch(`${state.proxyUrl}/health`);
      if ((await r.json()).ok) {
        statusEl.className = 'conn-status conn-ok';
        statusEl.innerHTML = `<span>✓</span><span>اتصال پروکسی برقرار است.</span>`;
        setTimeout(() => goStep(2), 1000);
        return;
      }
    } catch (e) { state.proxyUrl = ''; localStorage.removeItem('nahan_proxy_url'); }
  }

  // 2. Check direct connection
  const directOk = await testDirectApi();
  if (directOk) {
    statusEl.className = 'conn-status conn-ok';
    statusEl.innerHTML = `<span>✓</span><span>اتصال مستقیم برقرار است.</span>`;
    setTimeout(() => goStep(2), 1000);
    return;
  }

  // 3. Fallback to proxy buttons
  statusEl.className = 'conn-status conn-fail';
  statusEl.innerHTML = `<span>✗</span><span>اتصال مستقیم ممکن نیست.</span>`;
  proxyBtns.style.display = 'block';
}

      localStorage.setItem('nahan_proxy_url', url);

async function handleValidate() {
  const tokenEl = document.getElementById('inpTokens');
  const alertEl = document.getElementById('credAlert');
  const btnEl = document.getElementById('btnValidate');

  state.rawTokensInput = tokenEl.value;
  const rawTokens = tokenEl.value.split('\n').map(t => t.trim()).filter(t => t);
  
  if (rawTokens.length === 0) {
    alertEl.innerHTML = alert('error', 'لطفاً حداقل یک API Token وارد کنید.');
    return;
  }

  btnEl.disabled = true;
  btnEl.innerHTML = `<div class="spinner"></div> در حال بررسی توکن‌ها...`;
  alertEl.innerHTML = '';
  state.accountsList = []; 

  let errorsHtml = '';
  
  for (let i = 0; i < rawTokens.length; i++) {
    const token = rawTokens[i];
    const acctsResult = await fetchAccountsForToken(token);
    
    if (acctsResult.ok && acctsResult.accounts.length > 0) {
       const acct = acctsResult.accounts[0];
       state.accountsList.push({ token: token, accountId: acct.id, accountName: acct.name || acct.id });
    } else {
       errorsHtml += `توکن خط ${i + 1}: ${acctsResult.msg || 'بدون دسترسی'}<br>`;
    }
  }

  if (errorsHtml) {
     alertEl.innerHTML = alert('error', errorsHtml);
     if (state.accountsList.length === 0) {
         btnEl.disabled = false;
         btnEl.textContent = 'بررسی مجدد';
         return;
     }
  }

  alertEl.innerHTML += alert('success', `${state.accountsList.length} اکانت با موفقیت تایید و شناسایی شد!`);
  setTimeout(() => goStep(3), 1500);
}

function setProgress(id, status, textOverride) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `progress-item ${status}`;
  const icon = el.querySelector('.progress-icon');
  if (status === 'active') icon.innerHTML = '<div class="spinner"></div>';
  else if (status === 'done') icon.textContent = '✓';
  else if (status === 'error') icon.textContent = '✗';
  else icon.textContent = '○';
  
  if (textOverride) el.querySelector('.progress-text').textContent = textOverride;
}

async function runDeployment() {
  const alertEl = () => document.getElementById('deployAlert');
  const showBtns = () => { document.getElementById('deployButtons').style.display = 'flex'; };
  state.deployedPanels = []; 

  setProgress('prog-fetch', 'active');
  const fetchResult = await fetchWorkerCode();
  if (!fetchResult.ok) {
    setProgress('prog-fetch', 'error');
    alertEl().innerHTML = alert('error', fetchResult.msg);
    showBtns();
    return;
  }
  setProgress('prog-fetch', 'done', `سورس کد با موفقیت دریافت شد (نسخه ${state.workerVersion})`);

  let loopErrors = '';

  for (let i = 0; i < state.accountsList.length; i++) {
     const acc = state.accountsList[i];
     alertEl().innerHTML = alert('info', `⏳ در حال نصب روی اکانت ${i + 1} از ${state.accountsList.length} (${esc(acc.accountName)})...`);
     
     // Reset step UI for each loop iteration
     setProgress('prog-d1', 'active', 'ایجاد پایگاه داده D1');
     setProgress('prog-deploy', 'waiting', 'شخصی‌سازی کد و استقرار Worker');
     setProgress('prog-verify', 'waiting', 'فعال‌سازی آدرس و تایید');

     const res = await deployToAccount(i, acc.token, acc.accountId);
     
     if (res.ok) {
        // Wait a bit for Cloudflare CDN propagation
        await new Promise(resolve => setTimeout(resolve, 1500)); 
        state.deployedPanels.push({ url: `${res.url}/${state.apiRoute}/dash`, accountName: acc.accountName });
     } else {
        loopErrors += `اکانت ${i+1} (${acc.accountName}): ${res.msg}<br>`;
        if(res.step === 'd1') setProgress('prog-d1', 'error');
        if(res.step === 'deploy') setProgress('prog-deploy', 'error');
        if(res.step === 'verify') setProgress('prog-verify', 'error');
        // We continue to the next account even if this one fails!
        continue;
     }
  }

  if (loopErrors && state.deployedPanels.length === 0) {
      alertEl().innerHTML = alert('error', `تمام استقرارها با شکست مواجه شد:<br>${loopErrors}`);
      showBtns();
      return;
  }

  if (loopErrors) {
      alertEl().innerHTML = alert('warn', `عملیات پایان یافت اما برخی اکانت‌ها مشکل داشتند:<br>${loopErrors}`);
  } else {
      alertEl().innerHTML = alert('success', `✅ عملیات به پایان رسید. تمام پنل‌ها مستقر شدند.`);
  }
  
  setTimeout(() => goStep(5), 2000);
}
