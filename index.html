<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dexter Cluster Installer | نصب‌کننده کلاستر دکستر</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
--text:#e0e0ec;--text2:#8888a0;--text3:#55556a;
--cyan:#e53935;--cyan2:#c62828;--cyan-bg:rgba(229,57,53,.12);
--green:#00e676;--green-bg:rgba(0,230,118,.08);
--red:#ff4466;--red-bg:rgba(255,68,102,.08);
--yellow:#ffaa00;--yellow-bg:rgba(255,170,0,.08);
--border:#2a2a40;--border2:#3a3a55;
--radius:10px;--radius2:14px;
--shadow:0 4px 24px rgba(0,0,0,.4);
--font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
--font-mono:'SF Mono','Cascadia Code','Fira Code',monospace;
--transition:all .25s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px}
body{
font-family:var(--font);background:var(--bg);color:var(--text);
min-height:100vh;display:flex;flex-direction:column;align-items:center;
line-height:1.7;-webkit-font-smoothing:antialiased;
}

.container{width:100%;max-width:720px;padding:24px 20px 48px}

/* ── Header ── */
.header{text-align:center;margin-bottom:32px}
.logo{font-size:2.4rem;font-weight:800;letter-spacing:4px;
color:var(--cyan);margin-bottom:4px}
.logo-sub{color:var(--text2);font-size:.85rem;font-weight:400; line-height: 1.8;}
.badge{display:inline-block; margin-top: 6px; padding: 4px 12px; background: var(--cyan-bg); border: 1px solid rgba(229,57,53,.3); border-radius: 20px; font-size: 0.8rem; color: var(--cyan); font-weight: bold;}

/* ── Steps Indicator ── */
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:32px}
.step-dot{
width:10px;height:10px;border-radius:50%;background:var(--bg4);
border:2px solid var(--border2);transition:var(--transition);
}
.step-dot.active{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(229,57,53,.4)}
.step-dot.done{background:var(--green);border-color:var(--green)}

/* ── Card ── */
.card{
background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);
padding:32px;box-shadow:var(--shadow);transition:var(--transition);
animation:fadeIn .35s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.card-title{font-size:1.35rem;font-weight:700;margin-bottom:6px;color:var(--cyan)}
.card-subtitle{color:var(--text2);font-size:.9rem;margin-bottom:24px}

/* ── Form Elements ── */
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:.85rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input{
width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);
border-radius:var(--radius);color:var(--text);font-size:.95rem;
font-family:var(--font-mono);transition:var(--transition);outline:none
}
.form-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(229,57,53,.1)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:100px;font-family:var(--font-mono)}
.form-hint{font-size:.78rem;color:var(--text3);margin-top:4px}

/* ── Buttons ── */
.btn{
display:inline-flex;align-items:center;justify-content:center;gap:8px;
padding:12px 28px;border-radius:var(--radius);font-size:.95rem;
font-weight:600;cursor:pointer;border:none;transition:var(--transition);
font-family:var(--font)
}
.btn-primary{background:var(--cyan);color:#fff;box-shadow:0 2px 12px rgba(229,57,53,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(229,57,53,.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-group{display:flex;gap:12px;margin-top:28px}
.btn-sm{padding:8px 18px;font-size:.85rem}

/* ── Alerts ── */
.alert{
padding:14px 18px;border-radius:var(--radius);font-size:.88rem;
margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;line-height:1.6
}
.alert-info{background:var(--cyan-bg);border:1px solid rgba(229,57,53,.2);color:var(--cyan)}
.alert-success{background:var(--green-bg);border:1px solid rgba(0,230,118,.2);color:var(--green)}
.alert-error{background:var(--red-bg);border:1px solid rgba(255,68,102,.2);color:var(--red)}
.alert-warn{background:var(--yellow-bg);border:1px solid rgba(255,170,0,.2);color:var(--yellow)}
.alert-icon{font-size:1.1rem;flex-shrink:0;line-height:1.5}

/* ── Progress ── */
.progress-list{list-style:none;margin:8px 0}
.progress-item{
display:flex;align-items:center;gap:12px;padding:12px 16px;
border-radius:var(--radius);margin-bottom:8px;
background:var(--bg3);border:1px solid var(--border);
transition:var(--transition)
}
.progress-item.active{border-color:var(--cyan);background:var(--cyan-bg)}
.progress-item.done{border-color:var(--green);background:var(--green-bg)}
.progress-item.error{border-color:var(--red);background:var(--red-bg)}
.progress-item.waiting{opacity:.5}
.progress-icon{font-size:1.1rem;flex-shrink:0;width:24px;text-align:center}
.progress-text{flex:1;font-size:.9rem}

/* ── Spinner ── */
.spinner{
width:18px;height:18px;border:2px solid var(--border2);
border-top-color:var(--cyan);border-radius:50%;
animation:spin .8s linear infinite;flex-shrink:0
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Result Card ── */
.result-box{
background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
padding:24px;margin-bottom:12px; text-align: center;
}
.result-label{font-size:1rem;color:var(--text2);margin-bottom:12px}
.result-value{
font-family:var(--font-mono);font-size:1.1rem;color:var(--green);
word-break:break-all;background: var(--bg4); padding: 12px; border-radius: 8px; border: 1px dashed var(--border2);
margin-bottom: 16px;
}
.copy-btn{
background:var(--cyan);border:none;color:#fff;
padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem;
transition:var(--transition); font-weight: bold;
}
.copy-btn:hover{box-shadow:0 4px 12px rgba(229,57,53,.4); transform: translateY(-1px);}

/* ── Extra Elements ── */
.conn-status{display:flex;align-items:center;gap:12px;padding:16px 20px;border-radius:var(--radius);margin:16px 0;font-size:.95rem}
.conn-testing{background:var(--cyan-bg);border:1px solid rgba(229,57,53,.2)}
.conn-ok{background:var(--green-bg);border:1px solid rgba(0,230,118,.2)}
.conn-fail{background:var(--red-bg);border:1px solid rgba(255,68,102,.2)}

.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.feature-item{
display:flex;align-items:center;gap:10px;padding:12px 14px;
background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
font-size:.88rem;transition:var(--transition)
}
.feature-item:hover{border-color:var(--cyan);background:var(--cyan-bg)}

.code-block{
background:#0d0d14;border:1px solid var(--border);border-radius:var(--radius);
padding:14px 18px;font-family:var(--font-mono);font-size:.85rem;
color:var(--cyan);overflow-x:auto;margin:12px 0;line-height:1.6;
direction:ltr;text-align:left;position:relative
}
</style>
</head>
<body>

<div class="container">
<div class="header">
<div class="logo">DEXTER CLUSTER</div>
<div class="logo-sub">
    سیستم تجمیع‌کننده ترافیک هوشمند (بدون نیاز به پنل) <br>
    <div class="badge">نسخه سابسکرایپشن (Sub-Link)</div>
</div>
</div>

<div class="steps" id="stepsIndicator"></div>
<div id="stepContent"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  STATE MANAGEMENT
// ══════════════════════════════════════════════════════════
const totalSteps = 6;
let currentStep = 0;
const DEFAULT_PROXY_URL = 'https://nahan-installer.edge1-erpy.workers.dev';

const state = {
  proxyUrl: localStorage.getItem('dexter_proxy_url') || '',
  rawTokensInput: '',
  accountsList: [], 
  vlessConfigs: [],
  subLinkUrl: '',
  
  workerName: 'dex-node',
  uuid: crypto.randomUUID(), // Auto generate UUID
  
  workerCode: '',
};

// ══════════════════════════════════════════════════════════
//  CLOUDFLARE API ENGINE
// ══════════════════════════════════════════════════════════
const CF_API = 'https://api.cloudflare.com/client/v4';

async function cfFetch(path, token, options = {}) {
  const proxy = state.proxyUrl;
  let url = proxy ? `${proxy}${path}` : `${CF_API}${path}`;
  
  const headers = { 'Authorization': `Bearer ${token}`, ...options.headers };
  if (proxy) headers['X-Proxy-Target'] = path;
  if (options.body && !(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';

  try {
    const res = await fetch(url, { ...options, headers });
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } 
    catch(e) { return { success: false, errors: [{ message: 'پاسخ سرور نامعتبر است.' }] }; }
    return json;
  } catch (e) {
    if (e.name === 'TypeError' && e.message.includes('fetch')) {
       return { success: false, errors: [{ message: 'دسترسی مرورگر مسدود شده (خطای CORS).' }] };
    }
    return { success: false, errors: [{ message: `خطای شبکه: ${e.message}` }] };
  }
}

async function testDirectApi() {
  try {
    const res = await fetch(`${CF_API}/accounts`, { method: 'GET', headers: { 'Authorization': 'Bearer test' } });
    return (res.status === 401 || res.status === 200 || res.status === 403);
  } catch (e) { return false; }
}

async function fetchAccountsForToken(token) {
  const r = await cfFetch('/accounts', token);
  if (r.success && Array.isArray(r.result)) return { ok: true, accounts: r.result };
  return { ok: false, msg: r.errors?.[0]?.message || 'خطا در اعتبارسنجی توکن' };
}

// ══════════════════════════════════════════════════════════
//  CORE WORKER FUNCTIONS
// ══════════════════════════════════════════════════════════
async function fetchWorkerCode() {
  if (state.workerCode) return { ok: true };

  // دریافت یک هسته VLESS بسیار سبک و استاندارد (بدون دیتابیس)
  // از سورس معتبر زیزفین (edgetunnel) استفاده می‌کنیم تا سبک‌ترین حالت باشد.
  const sourceUrl = 'https://raw.githubusercontent.com/zizifn/edgetunnel/main/src/worker-vless.js';
  const proxyUrl = state.proxyUrl ? `${state.proxyUrl}/github` : sourceUrl;
  const opts = state.proxyUrl ? { headers: { 'X-GitHub-Url': sourceUrl } } : {};

  try {
    const res = await fetch(proxyUrl, opts);
    if (!res.ok) throw new Error('Failed to fetch worker code');
    let code = await res.text();
    
    // جایگذاری UUID هاردکد شده در اسکریپت
    code = code.replace(/let\s+userID\s*=\s*['"][^'"]+['"]/i, `let userID = '${state.uuid}'`);
    
    state.workerCode = code;
    return { ok: true };
  } catch (e) {
    return { ok: false, msg: 'خطا در دریافت هسته VLESS' };
  }
}

async function deployNodeToAccount(accountIndex, token, accountId) {
  setProgress('prog-deploy', 'active');
  
  const metadata = {
    main_module: 'worker.js',
    compatibility_date: '2024-09-22',
  };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('worker.js', new Blob([state.workerCode], { type: 'application/javascript+module' }), 'worker.js');

  const nodeName = `${state.workerName}-${accountIndex + 1}`;
  const deployPath = `/accounts/${accountId}/workers/scripts/${encodeURIComponent(nodeName)}`;
  const uploadRes = await cfFetch(deployPath, token, { method: 'PUT', body: form });
  if (!uploadRes.success) return { ok: false, step: 'deploy', msg: uploadRes.errors?.[0]?.message };

  await cfFetch(`${deployPath}/deployments`, token, {
    method: 'POST', body: JSON.stringify({ strategy: 'simple', manifest: { 'worker.js': { file: 'worker.js' } } })
  });
  setProgress('prog-deploy', 'done');

  setProgress('prog-verify', 'active');
  let subRes = await cfFetch(`/accounts/${accountId}/workers/subdomain`, token);
  if (!subRes.result?.subdomain) {
      const randomSub = 'proxy-' + Math.random().toString(36).substring(2, 8);
      await cfFetch(`/accounts/${accountId}/workers/subdomain`, token, { method: 'PUT', body: JSON.stringify({ subdomain: randomSub }) });
      subRes = await cfFetch(`/accounts/${accountId}/workers/subdomain`, token);
  }

  await cfFetch(`/accounts/${accountId}/workers/services/${encodeURIComponent(nodeName)}/environments/production/subdomain`, token, {
    method: 'POST', body: JSON.stringify({ enabled: true })
  });

  if (subRes.success && subRes.result?.subdomain) {
    const domain = `${nodeName}.${subRes.result.subdomain}.workers.dev`;
    setProgress('prog-verify', 'done');
    
    // تولید لینک VLESS خام برای این سرور
    const vlessUri = `vless://${state.uuid}@${domain}:443?encryption=none&security=tls&sni=${domain}&fp=random&type=ws&host=${domain}&path=/%3Fed%3D2048#Dexter-Node-${accountIndex + 1}`;
    state.vlessConfigs.push(vlessUri);
    
    return { ok: true, domain };
  }
  
  return { ok: false, step: 'verify', msg: 'خطا در دریافت زیردامنه' };
}

async function deploySubWorker(account) {
    setProgress('prog-sub', 'active');
    
    // تبدیل تمام کانفیگ‌ها به یک فایل Base64
    const b64Sub = btoa(state.vlessConfigs.join('\n'));
    
    // یک ورکر بسیار ساده که فقط متن Base64 را برمی‌گرداند
    const code = `export default { fetch(req) { return new Response(atob('${b64Sub}'), { headers: { 'Content-Type': 'text/plain; charset=utf-8' }}); } }`;
    const metadata = { main_module: 'worker.js', compatibility_date: '2024-09-22' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('worker.js', new Blob([code], { type: 'application/javascript+module' }), 'worker.js');
    
    const deployPath = `/accounts/${account.accountId}/workers/scripts/dexter-sub-link`;
    await cfFetch(deployPath, account.token, { method: 'PUT', body: form });
    await cfFetch(`${deployPath}/deployments`, account.token, { method: 'POST', body: JSON.stringify({ strategy: 'simple', manifest: { 'worker.js': { file: 'worker.js' } } }) });
    
    let subRes = await cfFetch(`/accounts/${account.accountId}/workers/subdomain`, account.token);
    await cfFetch(`/accounts/${account.accountId}/workers/services/dexter-sub-link/environments/production/subdomain`, account.token, { method: 'POST', body: JSON.stringify({ enabled: true }) });
    
    setProgress('prog-sub', 'done');
    return `https://dexter-sub-link.${subRes.result.subdomain}.workers.dev`;
}

// ══════════════════════════════════════════════════════════
//  STEP RENDERERS
// ══════════════════════════════════════════════════════════
function renderStepsIndicator() {
  let html = '';
  for (let i = 0; i < totalSteps; i++) {
    let cls = 'step-dot';
    if (i === currentStep) cls += ' active';
    else if (i < currentStep) cls += ' done';
    html += `<div class="${cls}"></div>`;
  }
  document.getElementById('stepsIndicator').innerHTML = html;
}

function renderStep() {
  renderStepsIndicator();
  const el = document.getElementById('stepContent');
  switch (currentStep) {
    case 0: el.innerHTML = renderWelcome(); break;
    case 1: el.innerHTML = renderConnTest(); runConnectivityTest(); break;
    case 2: el.innerHTML = renderCredentials(); break;
    case 3: el.innerHTML = renderConfig(); break;
    case 4: el.innerHTML = renderDeploy(); runDeployment(); break;
    case 5: el.innerHTML = renderSuccess(); break;
  }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function alert(type, msg) {
  const icons = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
  return `<div class="alert alert-${type}"><span class="alert-icon">${icons[type]}</span><span>${esc(msg)}</span></div>`;
}

function goStep(n) { currentStep = n; renderStep(); }

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('finalCopyBtn');
    if(btn) {
        btn.textContent = 'کپی شد!';
        setTimeout(() => { btn.textContent = 'کپی لینک سابسکرایپشن'; }, 2000);
    }
  });
}

function resetAll() {
  state.rawTokensInput = '';
  state.accountsList = [];
  state.vlessConfigs = [];
  state.uuid = crypto.randomUUID();
  goStep(0);
}

// ── UI STEPS ──

function renderWelcome() {
  return `
<div class="card step-panel">
  <div class="card-title">معماری کلاستر دکستر (تولید Sub-Link)</div>
  <div class="card-subtitle">دستیابی به ۱ میلیون درخواست بدون نیاز به هیچ پنل مدیریتی!</div>
  
  <div class="alert alert-info">
    <span class="alert-icon">💡</span>
    <span>این نسخه نیازی به پنل و دیتابیس ندارد. یک هسته سبک روی تمام اکانت‌های شما مستقر می‌شود و در نهایت <b>فقط یک لینک سابسکرایپشن</b> به شما تحویل می‌دهد.</span>
  </div>

  <div style="margin-bottom:20px">
    <div class="feature-grid">
      <div class="feature-item"><span class="feature-icon">🚀</span><span>بدون پنل و بدون باگ دیتابیس</span></div>
      <div class="feature-item"><span class="feature-icon">🔗</span><span>تولید هوشمند یک لینک مشترک</span></div>
      <div class="feature-item"><span class="feature-icon">⚡</span><span>تضمین Load Balance واقعی</span></div>
      <div class="feature-item"><span class="feature-icon">🛡️</span><span>امنیت و سرعت فوق‌العاده بالا</span></div>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="goStep(1)">شروع کنیم</button>
  </div>
</div>`;
}

function renderConnTest() {
  return `
<div class="card step-panel">
  <div class="card-title">بررسی ارتباط سرور</div>
  <div class="conn-status conn-testing" id="connStatus">
    <div class="spinner"></div><span>در حال آزمایش اتصال...</span>
  </div>
  <div id="proxyButtons" style="display:none;margin:20px 0">
    <button class="btn btn-primary" onclick="connectDefaultProxy()">⚡ اتصال با پروکسی</button>
  </div>
  <div id="connResult"></div>
</div>`;
}

async function runConnectivityTest() {
  const statusEl = document.getElementById('connStatus');
  const directOk = await testDirectApi();
  if (directOk) {
    statusEl.className = 'conn-status conn-ok';
    statusEl.innerHTML = `<span>✓</span><span>اتصال مستقیم برقرار است.</span>`;
    setTimeout(() => goStep(2), 1000);
  } else {
    connectDefaultProxy();
  }
}

async function connectDefaultProxy() {
  const statusEl = document.getElementById('connStatus');
  try {
      const r = await fetch(`${DEFAULT_PROXY_URL}/health`);
      if ((await r.json()).ok) {
        state.proxyUrl = DEFAULT_PROXY_URL;
        statusEl.className = 'conn-status conn-ok';
        statusEl.innerHTML = `<span>✓</span><span>اتصال پروکسی برقرار شد.</span>`;
        setTimeout(() => goStep(2), 1000);
        return;
      }
  } catch (e) {}
  statusEl.className = 'conn-status conn-fail';
  statusEl.innerHTML = `<span>✗</span><span>خطا در ارتباط. لطفا با VPN تست کنید.</span>`;
}

function renderCredentials() {
  return `
<div class="card step-panel">
  <div class="card-title">وارد کردن توکن‌های کلودفلر</div>
  <div class="card-subtitle">هر تعداد توکن که دارید در کادر زیر وارد کنید (هر خط یک توکن)</div>
  <div id="credAlert"></div>
  <div class="form-group">
    <textarea class="form-input" id="inpTokens" rows="6"
              placeholder="مثال:\nToken_Account1_xxxxxx\nToken_Account2_xxxxxx"
              spellcheck="false" style="direction:ltr;text-align:left">${state.rawTokensInput}</textarea>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" id="btnValidate" onclick="handleValidate()">تایید توکن‌ها</button>
    <button class="btn btn-secondary" onclick="goStep(1)">بازگشت</button>
  </div>
</div>`;
}

async function handleValidate() {
  const tokenEl = document.getElementById('inpTokens');
  const alertEl = document.getElementById('credAlert');
  const btnEl = document.getElementById('btnValidate');

  state.rawTokensInput = tokenEl.value;
  const rawTokens = tokenEl.value.split(/\r?\n/).map(t => t.trim()).filter(t => t.length > 5);
  
  if (rawTokens.length === 0) return;

  btnEl.disabled = true;
  btnEl.innerHTML = `<div class="spinner"></div> بررسی...`;
  state.accountsList = []; 
  
  for (let i = 0; i < rawTokens.length; i++) {
    const acctsResult = await fetchAccountsForToken(rawTokens[i]);
    if (acctsResult.ok && acctsResult.accounts.length > 0) {
       state.accountsList.push({ token: rawTokens[i], accountId: acctsResult.accounts[0].id, accountName: acctsResult.accounts[0].name });
    }
  }

  if (state.accountsList.length > 0) {
     alertEl.innerHTML = alert('success', `${state.accountsList.length} اکانت شناسایی شد!`);
     setTimeout(() => goStep(3), 1000);
  } else {
     alertEl.innerHTML = alert('error', 'هیچ توکن معتبری یافت نشد.');
     btnEl.disabled = false;
     btnEl.textContent = 'تایید توکن‌ها';
  }
}

function generateNewUUID() {
    document.getElementById('inpUUID').value = crypto.randomUUID();
}

function renderConfig() {
  return `
<div class="card step-panel">
  <div class="card-title">پیکربندی هویت (UUID)</div>
  <div class="card-subtitle">این شناسه در تمام سرورهای شما تزریق خواهد شد</div>
  
  <div class="form-group">
    <label class="form-label">شناسه کاربر (UUID)</label>
    <div style="display:flex;gap:10px">
        <input type="text" class="form-input" id="inpUUID" value="${state.uuid}" style="direction:ltr;text-align:left;flex:1">
        <button class="btn btn-secondary btn-sm" onclick="generateNewUUID()">تولید جدید</button>
    </div>
    <div class="form-hint">این رمز اتصال شماست. آن را تغییر ندهید مگر اینکه می‌دانید چه می‌کنید.</div>
  </div>

  <div id="configAlert"></div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="handleConfigNext()">استقرار نهایی و ساخت لینک</button>
    <button class="btn btn-secondary" onclick="goStep(2)">بازگشت</button>
  </div>
</div>`;
}

function handleConfigNext() {
  const uuid = document.getElementById('inpUUID').value.trim();
  if (uuid.length < 10) {
    document.getElementById('configAlert').innerHTML = alert('error', 'UUID نامعتبر است.');
    return;
  }
  state.uuid = uuid;
  goStep(4);
}

function renderDeploy() {
  return `
<div class="card step-panel">
  <div class="card-title">در حال استقرار کلاستر ایستا...</div>
  
  <div id="deployAlert" style="margin-bottom:16px;"></div>

  <ul class="progress-list">
    <li class="progress-item waiting" id="prog-fetch">
      <span class="progress-icon">○</span><div class="progress-text">دریافت هسته VLESS اختصاصی</div>
    </li>
    <li class="progress-item waiting" id="prog-deploy">
      <span class="progress-icon">○</span><div class="progress-text">تزریق UUID و استقرار روی سرورها</div>
    </li>
    <li class="progress-item waiting" id="prog-verify">
      <span class="progress-icon">○</span><div class="progress-text">فعال‌سازی دامنه‌های کلاستر</div>
    </li>
    <li class="progress-item waiting" id="prog-sub">
      <span class="progress-icon">○</span><div class="progress-text">تولید ورکر سابسکرایپشن مرکزی</div>
    </li>
  </ul>
</div>`;
}

function setProgress(id, status, textOverride) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `progress-item ${status}`;
  const icon = el.querySelector('.progress-icon');
  if (status === 'active') icon.innerHTML = '<div class="spinner"></div>';
  else if (status === 'done') icon.textContent = '✓';
  else if (status === 'error') icon.textContent = '✗';
  else icon.textContent = '○';
  if (textOverride) el.querySelector('.progress-text').textContent = textOverride;
}

async function runDeployment() {
  const alertEl = () => document.getElementById('deployAlert');

  setProgress('prog-fetch', 'active');
  const fetchResult = await fetchWorkerCode();
  if (!fetchResult.ok) {
    setProgress('prog-fetch', 'error');
    alertEl().innerHTML = alert('error', fetchResult.msg);
    return;
  }
  setProgress('prog-fetch', 'done');

  for (let i = 0; i < state.accountsList.length; i++) {
     const acc = state.accountsList[i];
     alertEl().innerHTML = alert('info', `⏳ تزریق کد در اکانت ${i + 1} از ${state.accountsList.length}...`);
     
     setProgress('prog-deploy', 'active');
     setProgress('prog-verify', 'waiting');

     const res = await deployNodeToAccount(i, acc.token, acc.accountId);
     if (!res.ok) {
        alertEl().innerHTML = alert('warn', `اکانت ${i+1} با خطا مواجه شد. در حال پرش به بعدی...`);
     }
  }

  if (state.vlessConfigs.length === 0) {
      alertEl().innerHTML = alert('error', `استقرار روی تمام اکانت‌ها با خطا مواجه شد.`);
      return;
  }

  // مرحله نهایی: ساخت ورکر سابسکرایپشن روی اکانت اول
  alertEl().innerHTML = alert('info', `⏳ در حال ساخت لینک سابسکرایپشن نهایی...`);
  try {
      state.subLinkUrl = await deploySubWorker(state.accountsList[0]);
  } catch(e) {
      // در صورت خطا، حداقل لینک‌ها تولید شده‌اند
  }
  
  setTimeout(() => goStep(5), 1500);
}

function renderSuccess() {
  return `
<div class="card step-panel">
  <div class="card-title" style="color:var(--green)">🎉 کلاستر با موفقیت ساخته شد!</div>
  <div class="card-subtitle">تمامی ${state.vlessConfigs.length} سرور شما با موفقیت در قالب یک لینک ادغام شدند.</div>

  <div class="alert alert-success">
    <span class="alert-icon">💡</span>
    <span>فقط کافیست لینک زیر را کپی کرده و در برنامه v2rayNG / NekoBox خود به عنوان Subscription اضافه کنید. گزینه Load Balance برنامه را روشن کنید تا از تمام ظرفیت سرورها به صورت تجمیع شده استفاده کنید.</span>
  </div>

  <div class="result-box">
    <div class="result-label">لینک سابسکرایپشن (Sub Link) اختصاصی شما:</div>
    <div class="result-value" id="subLinkText">
        ${state.subLinkUrl || 'خطا در تولید URL. کدهای خام در دسترس است.'}
    </div>
    <button id="finalCopyBtn" class="copy-btn" onclick="copyText('${esc(state.subLinkUrl)}')">کپی لینک سابسکرایپشن</button>
  </div>

  <div class="btn-group">
    <button class="btn btn-secondary" onclick="resetAll()">نصب مجدد کلاستر</button>
  </div>
</div>`;
}

renderStep();
</script>
</body>
