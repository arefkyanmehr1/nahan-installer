<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nahan Multi-Installer | نصب‌کننده گروهی نهان</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
--text:#e0e0ec;--text2:#8888a0;--text3:#55556a;
--cyan:#e53935;--cyan2:#c62828;--cyan-bg:rgba(229,57,53,.12);
--green:#00e676;--green-bg:rgba(0,230,118,.08);
--red:#ff4466;--red-bg:rgba(255,68,102,.08);
--yellow:#ffaa00;--yellow-bg:rgba(255,170,0,.08);
--purple:#e53935;
--border:#2a2a40;--border2:#3a3a55;
--radius:10px;--radius2:14px;
--shadow:0 4px 24px rgba(0,0,0,.4);
--font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
--font-mono:'SF Mono','Cascadia Code','Fira Code',monospace;
--transition:all .25s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px}
body{
font-family:var(--font);background:var(--bg);color:var(--text);
min-height:100vh;display:flex;flex-direction:column;align-items:center;
line-height:1.7;-webkit-font-smoothing:antialiased;
}
body.ltr{direction:ltr}
body.rtl{direction:rtl}

.container{width:100%;max-width:720px;padding:24px 20px 48px}

/* ── Header ── */
.header{text-align:center;margin-bottom:32px}
.logo{font-size:2.4rem;font-weight:800;letter-spacing:4px;
color:var(--cyan);
font-weight:900;
margin-bottom:4px}
.logo-sub{color:var(--text2);font-size:.85rem;font-weight:400}
.lang-btn{
position:fixed;top:16px;left:16px;z-index:100;
background:var(--bg3);border:1px solid var(--border);color:var(--cyan);
padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.8rem;
font-weight:600;transition:var(--transition)
}
body.ltr .lang-btn{left:auto;right:16px}
.lang-btn:hover{background:var(--cyan-bg);border-color:var(--cyan)}

/* ── Steps Indicator ── */
.steps{display:flex;justify-content:center;gap:6px;margin-bottom:32px}
.step-dot{
width:10px;height:10px;border-radius:50%;background:var(--bg4);
border:2px solid var(--border2);transition:var(--transition);
position:relative
}
.step-dot.active{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,.4)}
.step-dot.done{background:var(--green);border-color:var(--green)}

/* ── Card ── */
.card{
background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);
padding:32px;box-shadow:var(--shadow);transition:var(--transition)
}
.card-title{
font-size:1.35rem;font-weight:700;margin-bottom:6px;
color:var(--cyan)
}
.card-subtitle{color:var(--text2);font-size:.9rem;margin-bottom:24px}

/* ── Form Elements ── */
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:.85rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input{
width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);
border-radius:var(--radius);color:var(--text);font-size:.95rem;
font-family:var(--font-mono);transition:var(--transition);outline:none
}
.form-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:100px;font-family:var(--font-mono)}
.form-hint{font-size:.78rem;color:var(--text3);margin-top:4px}

/* ── Buttons ── */
.btn{
display:inline-flex;align-items:center;justify-content:center;gap:8px;
padding:12px 28px;border-radius:var(--radius);font-size:.95rem;
font-weight:600;cursor:pointer;border:none;transition:var(--transition);
font-family:var(--font)
}
.btn-primary{
background:var(--cyan);color:#fff;
box-shadow:0 2px 12px rgba(229,57,53,.3)
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,212,255,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-group{display:flex;gap:12px;margin-top:28px}
[dir=ltr] .btn-group{flex-direction:row-reverse}
.btn-sm{padding:8px 18px;font-size:.85rem}

/* ── Alerts ── */
.alert{
padding:14px 18px;border-radius:var(--radius);font-size:.88rem;
margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;
line-height:1.6
}
.alert-info{background:var(--cyan-bg);border:1px solid rgba(0,212,255,.2);color:var(--cyan)}
.alert-success{background:var(--green-bg);border:1px solid rgba(0,230,118,.2);color:var(--green)}
.alert-error{background:var(--red-bg);border:1px solid rgba(255,68,102,.2);color:var(--red)}
.alert-warn{background:var(--yellow-bg);border:1px solid rgba(255,170,0,.2);color:var(--yellow)}
.alert-icon{font-size:1.1rem;flex-shrink:0;line-height:1.5}

/* ── Progress ── */
.progress-list{list-style:none;margin:8px 0}
.progress-item{
display:flex;align-items:center;gap:12px;padding:12px 16px;
border-radius:var(--radius);margin-bottom:8px;
background:var(--bg3);border:1px solid var(--border);
transition:var(--transition)
}
.progress-item.active{border-color:var(--cyan);background:var(--cyan-bg)}
.progress-item.done{border-color:var(--green);background:var(--green-bg)}
.progress-item.error{border-color:var(--red);background:var(--red-bg)}
.progress-item.waiting{opacity:.5}
.progress-icon{font-size:1.1rem;flex-shrink:0;width:24px;text-align:center}
.progress-text{flex:1;font-size:.9rem}
.progress-detail{font-size:.78rem;color:var(--text2);margin-top:2px}

/* ── Spinner ── */
.spinner{
width:18px;height:18px;border:2px solid var(--border2);
border-top-color:var(--cyan);border-radius:50%;
animation:spin .8s linear infinite;flex-shrink:0
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Result Card ── */
.result-box{
background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
padding:16px;margin-bottom:12px
}
.result-label{font-size:.8rem;color:var(--text2);margin-bottom:4px}
.result-value{
font-family:var(--font-mono);font-size:1.05rem;color:var(--cyan);
word-break:break-all;display:flex;align-items:center;gap:10px
}
.copy-btn{
background:var(--bg4);border:1px solid var(--border);color:var(--text2);
padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;
transition:var(--transition);flex-shrink:0
}
.copy-btn:hover{color:var(--cyan);border-color:var(--cyan)}
.copy-btn.copied{color:var(--green);border-color:var(--green)}

/* ── Code Block ── */
.code-block{
background:#0d0d14;border:1px solid var(--border);border-radius:var(--radius);
padding:14px 18px;font-family:var(--font-mono);font-size:.85rem;
color:var(--purple);overflow-x:auto;margin:12px 0;line-height:1.6;
direction:ltr;text-align:left;position:relative
}

/* ── Connectivity Test ── */
.conn-status{
display:flex;align-items:center;gap:12px;padding:16px 20px;
border-radius:var(--radius);margin:16px 0;font-size:.95rem
}
.conn-testing{background:var(--cyan-bg);border:1px solid rgba(0,212,255,.2)}
.conn-ok{background:var(--green-bg);border:1px solid rgba(0,230,118,.2)}
.conn-fail{background:var(--red-bg);border:1px solid rgba(255,68,102,.2)}

/* ── Features ── */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.feature-item{
display:flex;align-items:center;gap:10px;padding:12px 14px;
background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
font-size:.88rem;transition:var(--transition)
}
.feature-item:hover{border-color:var(--cyan);background:var(--cyan-bg)}

.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:520px){.config-grid{grid-template-columns:1fr}}
.divider{height:1px;background:var(--border);margin:20px 0}

</style>
</head>
<body>

<button class="lang-btn" onclick="toggleLang()">EN / فا</button>

<div class="container">
<div class="header">
<div class="logo">NAHAN</div>
<div class="logo-sub" data-t="logoSub">نصب‌کننده گروهی (Multi-Token) — نسخه ۲.۰</div>
</div>

<div class="steps" id="stepsIndicator"></div>

<div id="stepContent"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  TRANSLATIONS
// ══════════════════════════════════════════════════════════
const T = {
  logoSub: { fa: 'نصب‌کننده گروهی (Multi-Token) — نسخه ۲.۰', en: 'Multi-Token Batch Installer — v2.0' },

  // ── Step 1: Welcome ──
  welcomeTitle: { fa: 'به نصب‌کننده گروهی نهان خوش آمدید', en: 'Welcome to Nahan Multi-Installer' },

  },
  welcomeDesc: {

    en: 'This tool is designed for batch deployment across multiple accounts (Load Balancing) to bypass Cloudflare request limits.'
  },

  createD1: { fa: 'پایگاه داده D1 اختصاصی', en: 'Dedicated D1 database' },
  createWorker: { fa: 'Cloudflare Worker', en: 'Cloudflare Worker' },
  createBinding: { fa: 'اتصال خودکار D1', en: 'Automated D1 Binding' },
  letsStart: { fa: 'شروع کنیم', en: "Let's Start" },

  // ── Step 2: Credentials ──
  credTitle: { fa: 'اعتبارنامه‌های Cloudflare (گروهی)', en: 'Cloudflare Credentials (Batch)' },
  credSub: { fa: 'توکن‌های API اکانت‌های مختلف خود را وارد کنید', en: 'Enter your API Tokens from different accounts' },
  labelToken: { fa: 'توکن‌ها (API Tokens)', en: 'API Tokens' },
  hintToken: { fa: 'هر توکن را در یک خط مجزا قرار دهید. سیستم به طور خودکار اکانت‌ها را استخراج می‌کند.', en: 'Place each token on a new line. The system will automatically fetch Account IDs.' },
  validatingTokens: { fa: 'در حال بررسی توکن‌ها...', en: 'Validating tokens...' },
  validate: { fa: 'بررسی و تایید', en: 'Validate & Confirm' },
  createTokenBtn: { fa: 'ساخت API Token در Cloudflare', en: 'Create API Token on Cloudflare' },
  back: { fa: 'بازگشت', en: 'Back' },
  next: { fa: 'مرحله بعد', en: 'Next' },

  // ── Step 3: Configuration ──
  configTitle: { fa: 'پیکربندی استقرار', en: 'Deployment Configuration' },
  configSub: { fa: 'تنظیمات زیر روی تمامی اکانت‌ها اعمال خواهد شد', en: 'These settings will be applied to ALL accounts' },
  labelWorker: { fa: 'نام Worker', en: 'Worker Name' },
  labelDB: { fa: 'نام پایگاه داده D1', en: 'D1 Database Name' },
  labelPassword: { fa: 'رمز عبور مشترک پنل‌ها', en: 'Shared Panel Password' },
  advSettings: { fa: 'تنظیمات پیشرفته', en: 'Advanced Settings' },
  labelApiRoute: { fa: 'مسیر پنل (API Route)', en: 'Panel Path (API Route)' },

  // ── Step 4: Deployment ──
  deployTitle: { fa: 'در حال استقرار گروهی...', en: 'Batch Deploying...' },
  deploySub: { fa: 'لطفاً صبر کنید تا فرآیند روی تمامی اکانت‌ها تکمیل شود', en: 'Please wait while the process completes for all accounts' },
  stepFetch: { fa: 'دریافت سورس کد Worker', en: 'Fetching Worker source code' },
  stepD1: { fa: 'ایجاد پایگاه داده D1', en: 'Creating D1 database' },
  stepDeploy: { fa: 'استقرار Worker و کدها', en: 'Deploying Worker & code' },
  stepVerify: { fa: 'فعال‌سازی URL و تایید', en: 'Enabling URL & Verification' },

  // ── Step 5: Success ──
  successTitle: { fa: '🚀 استقرار گروهی موفق!', en: '🚀 Batch Deployment Successful!' },
  successSub: { fa: 'ورکرها روی اکانت‌های تایید شده مستقر شدند.', en: 'Workers deployed on all verified accounts.' },
  linksLabel: { fa: 'آدرس پنل‌های مدیریت ساخته شده:', en: 'Created Dashboard URLs:' },
  passLabel: { fa: 'رمز عبور مشترک:', en: 'Shared Password:' },
  copy: { fa: 'کپی', en: 'Copy' },
  copied: { fa: 'کپی شد!', en: 'Copied!' },
  newInstall: { fa: 'نصب مجدد', en: 'New Install' },
  
  // ── Errors & Proxy ──
  connTitle: { fa: 'بررسی اتصال', en: 'Connectivity Check' },
  connTesting: { fa: 'در حال آزمایش اتصال...', en: 'Testing connection...' },
  proxyConnected: { fa: 'اتصال مستقیم/پروکسی برقرار است.', en: 'Direct/Proxy connection is active.' },
  errFetchAll: { fa: 'خطا در دریافت سورس کد', en: 'Failed to fetch source code' }
};

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let lang = 'fa';
let currentStep = 0;
const totalSteps = 6;

const DEFAULT_PROXY_URL = 'https://nahan-installer.edge1-erpy.workers.dev';

const state = {
  // این مقادیر موقت هستند و در طول حلقه برای هر اکانت تغییر میکنند
  apiToken: '',
  accountId: '',
  
  // دیتای ورودی کاربر
  rawTokensInput: '',
  accountsList: [], // { token, accountId, accountName }
  deployedPanels: [], // { url }

  // تنظیمات مشترک
  workerName: 'nahan-core',
  dbName: 'iot_db',
  dbId: '',
  password: '',
  tgToken: '',
  tgAdminId: '',
  apiRoute: 'sync',
  
  workerCode: '',
  workerVersion: '',
  deployUrl: '',
  proxyUrl: localStorage.getItem('nahan_proxy_url') || '',
};

// ══════════════════════════════════════════════════════════
//  TRANSLATION ENGINE
// ══════════════════════════════════════════════════════════
function t(key) {
  const entry = T[key];
  if (!entry) return key;
  if (typeof entry === 'string') return entry;
  return entry[lang] || entry.en || key;
}

function applyTranslations() {
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    const val = t(key);
    if (typeof val === 'string') el.textContent = val;
  });
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'fa' ? 'rtl' : 'ltr';
  document.body.className = lang === 'fa' ? 'rtl' : 'ltr';
}

function toggleLang() {
  lang = lang === 'fa' ? 'en' : 'fa';
  renderStep();
}

// ══════════════════════════════════════════════════════════
//  CLOUDFLARE API
// ══════════════════════════════════════════════════════════
const CF_API = 'https://api.cloudflare.com/client/v4';

async function cfFetch(path, options = {}) {
  const method = options.method || 'GET';
  const proxy = state.proxyUrl;
  const url = proxy ? `${proxy}${path}` : `${CF_API}${path}`;
  
  const headers = {
    'Authorization': `Bearer ${state.apiToken}`,
    ...options.headers,
  };
  
  if (proxy) headers['X-Proxy-Target'] = path;
  if (options.body && !(options.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }

  try {
    const res = await fetch(url, { ...options, headers });
    let data;
    try {
      data = await res.json();
    } catch(e) {
      return { success: false, errors: [{ message: 'Non-JSON response' }] };
    }
    return data;
  } catch (e) {
    return { success: false, errors: [{ message: e.message }] };
  }
}

async function testDirectApi() {
  try {
    const res = await fetch(`${CF_API}/accounts`, { headers: { 'Authorization': 'Bearer test' }});
    return (res.status === 401 || res.status === 200 || res.status === 403);
  } catch (e) { return false; }
}

async function fetchAccounts(token) {
  const prevToken = state.apiToken;
  state.apiToken = token;
  const r = await cfFetch('/accounts');
  state.apiToken = prevToken;
  if (r.success && Array.isArray(r.result)) {
    return { ok: true, accounts: r.result };
  }
  return { ok: false, msg: r.errors?.[0]?.message || 'Invalid Token' };
}

// ══════════════════════════════════════════════════════════
//  CORE WORKER FUNCTIONS
// ══════════════════════════════════════════════════════════
async function fetchWorkerCode() {
  if (state.workerCode) return { ok: true }; // Already fetched

  const url = state.proxyUrl 
     ? `${state.proxyUrl}/github` 
     : 'https://cdn.jsdelivr.net/gh/itsyebekhe/nahan@main/_worker.js';
     
  try {
    const fetchOpts = state.proxyUrl ? { headers: { 'X-GitHub-Url': 'https://raw.githubusercontent.com/itsyebekhe/nahan/refs/heads/main/_worker.js' } } : {};
    const res = await fetch(url, fetchOpts);
    if (!res.ok) return { ok: false };
    
    state.workerCode = await res.text();
    const verMatch = state.workerCode.match(/const\s+CURRENT_VERSION\s*=\s*["']([^"']+)["']/);
    state.workerVersion = verMatch ? verMatch[1] : '';
    return { ok: true };
  } catch (e) {
    return { ok: false, msg: e.message };
  }
}

async function createD1Database() {
  const r = await cfFetch(`/accounts/${state.accountId}/d1/database`, {
    method: 'POST',
    body: JSON.stringify({ name: state.dbName }),
  });
  if (r.success) {
    state.dbId = r.result?.uuid || r.result?.database_id || '';
    return { ok: true };
  }
  
  // Check if exists
  const check = await cfFetch(`/accounts/${state.accountId}/d1/database`);
  if (check.success && Array.isArray(check.result)) {
    const db = check.result.find(d => d.name === state.dbName);
    if (db) {
      state.dbId = db.uuid || db.database_id || '';
      return { ok: true, existed: true };
    }
  }
  return { ok: false, msg: r.errors?.[0]?.message || 'D1 Error' };
}

async function deployWorker() {
  let code = state.workerCode;

  if (state.password && state.password !== 'admin') {
    code = code.replace(/masterKey\s*[=:]\s*['"]admin['"]/g, `masterKey: '${state.password}'`);
    code = code.replace(/MASTER_KEY\s*=\s*['"]admin['"]/g, `MASTER_KEY = '${state.password}'`);
    code = code.replace(/['"]admin['"]\s*\/\/\s*default\s*password/gi, `'${state.password}' // custom password`);
    code = code.replace(/password\s*[=:]\s*['"]admin['"]/g, `password: '${state.password}'`);
  }
  code = code.replace(/cfWorkerName\s*:\s*['"][^'"]*['"]/g, `cfWorkerName: "${state.workerName}"`);
  code = code.replace(/cfAccountId\s*:\s*['"][^'"]*['"]/g, `cfAccountId: "${state.accountId}"`);
  code = code.replace(/cfApiToken\s*:\s*['"][^'"]*['"]/g, `cfApiToken: "${state.apiToken}"`);
  code = code.replace(/apiRoute\s*:\s*['"][^'"]*['"]/g, `apiRoute: "${state.apiRoute}"`);
  
  const metadata = {
    main_module: 'worker.js',
    compatibility_date: '2024-09-22',
    compatibility_flags: ['nodejs_compat'],
    bindings: [{ name: 'IOT_DB', type: 'd1', id: state.dbId }]
  };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('worker.js', new Blob([code], { type: 'application/javascript+module' }), 'worker.js');

  // Upload Code
  const path = `/accounts/${state.accountId}/workers/scripts/${encodeURIComponent(state.workerName)}`;
  const uploadRes = await cfFetch(path, { method: 'PUT', body: form });
  if (!uploadRes.success) return { ok: false, msg: uploadRes.errors?.[0]?.message };

  // Deploy version
  await cfFetch(`${path}/deployments`, {
    method: 'POST', body: JSON.stringify({ strategy: 'simple', manifest: { 'worker.js': { file: 'worker.js' } } })
  });

  // Enable URL
  await cfFetch(`/accounts/${state.accountId}/workers/services/${encodeURIComponent(state.workerName)}/environments/production/subdomain`, {
    method: 'POST', body: JSON.stringify({ enabled: true })
  });

  return { ok: true };
}

async function enableWorkersDevUrl() {
  const res = await cfFetch(`/accounts/${state.accountId}/workers/subdomain`);
  if (res.success && res.result?.subdomain) {
    state.deployUrl = `https://${state.workerName}.${res.result.subdomain}.workers.dev`;
    return { ok: true };
  }
  return { ok: false };
}

// ══════════════════════════════════════════════════════════
//  STEP RENDERERS
// ══════════════════════════════════════════════════════════
function renderStepsIndicator() {
  let html = '';
  for (let i = 0; i < totalSteps; i++) {
    let cls = 'step-dot';
    if (i === currentStep) cls += ' active';
    else if (i < currentStep) cls += ' done';
    html += `<div class="${cls}"></div>`;
  }
  document.getElementById('stepsIndicator').innerHTML = html;
}

function renderStep() {
  renderStepsIndicator();
  const el = document.getElementById('stepContent');
  switch (currentStep) {
    case 0: el.innerHTML = renderWelcome(); break;
    case 1: el.innerHTML = renderConnTest(); runConnectivityTest(); break;
    case 2: el.innerHTML = renderCredentials(); break;
    case 3: el.innerHTML = renderConfig(); break;
    case 4: el.innerHTML = renderDeploy(); runDeployment(); break;
    case 5: el.innerHTML = renderSuccess(); break;
  }
  applyTranslations();
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function alert(type, msg) {
  const icons = { info: 'ℹ️', success: '✅', error: '❌', warn: '⚠️' };
  return `<div class="alert alert-${type}"><span class="alert-icon">${icons[type]}</span><span>${esc(msg)}</span></div>`;
}

function goStep(n) { currentStep = n; renderStep(); }

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  });
}

function resetAll() {
  state.rawTokensInput = '';
  state.accountsList = [];
  state.deployedPanels = [];
  goStep(0);
}

// ── UI STEPS ──

  <div style="margin-bottom:20px">
    <div style="font-weight:600;margin-bottom:10px;font-size:.95rem" data-t="whatCreated"></div>
    <div class="feature-grid">
      <div class="feature-item"><span class="feature-icon">🗄️</span><span data-t="createD1"></span></div>
      <div class="feature-item"><span class="feature-icon">⚡</span><span data-t="createWorker"></span></div>
      <div class="feature-item"><span class="feature-icon">🔗</span><span data-t="createBinding"></span></div>
    </div>
  </div>

    <button class="btn btn-primary" onclick="goStep(1)" data-t="letsStart"></button>

function renderConnTest() {
  return `
<div class="card step-panel">
  <div class="card-title" data-t="connTitle"></div>
  <div class="conn-status conn-testing" id="connStatus">
    <div class="spinner"></div><span data-t="connTesting"></span>
  </div>
  <div class="btn-group">
    <button class="btn btn-secondary" onclick="goStep(0)" data-t="back"></button>
  </div>
</div>`;
}

async function runConnectivityTest() {
  const statusEl = document.getElementById('connStatus');
  
  if (state.proxyUrl) {
    try {
      const r = await fetch(`${state.proxyUrl}/health`);
      if ((await r.json()).ok) {
        statusEl.className = 'conn-status conn-ok';
        statusEl.innerHTML = `<span>✓</span><span data-t="proxyConnected"></span>`;
        setTimeout(() => goStep(2), 1000);
        return;
      }
    } catch (e) { state.proxyUrl = ''; }
  }

  const directOk = await testDirectApi();
  if (directOk) {
    statusEl.className = 'conn-status conn-ok';
    statusEl.innerHTML = `<span>✓</span><span data-t="proxyConnected"></span>`;
    setTimeout(() => goStep(2), 1000);
    return;
  }

  // Fallback to proxy
  try {
      const r = await fetch(`${DEFAULT_PROXY_URL}/health`);
      if ((await r.json()).ok) {
        state.proxyUrl = DEFAULT_PROXY_URL;
        statusEl.className = 'conn-status conn-ok';
        statusEl.innerHTML = `<span>✓</span><span data-t="proxyConnected"></span>`;
        setTimeout(() => goStep(2), 1000);
        return;
      }
  } catch (e) {}
}

function renderCredentials() {
  const tokenName = 'Nahan Batch Installer';
  const createTokenUrl = `https://dash.cloudflare.com/profile/api-tokens?permissionGroupKeys=%5B%7B%22key%22%3A%22workers_scripts%22%2C%22type%22%3A%22edit%22%7D%2C%7B%22key%22%3A%22d1%22%2C%22type%22%3A%22edit%22%7D%2C%7B%22key%22%3A%22account_settings%22%2C%22type%22%3A%22read%22%7D%5D&accountId=*&zoneId=all&name=${encodeURIComponent(tokenName)}`;

  return `
<div class="card step-panel">
  <div class="card-title" data-t="credTitle"></div>
  <div class="card-subtitle" data-t="credSub"></div>
  <div id="credAlert"></div>
  
  <div class="form-group">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
       <label class="form-label" style="margin:0" data-t="labelToken"></label>
       <a href="${createTokenUrl}" target="_blank" class="btn btn-secondary btn-sm" data-t="createTokenBtn" style="font-size:0.75rem;padding:4px 10px;"></a>
    </div>
    <textarea class="form-input" id="inpTokens" rows="6"
              placeholder="${lang === 'fa' ? 'مثال:\nToken1xxxxxx\nToken2xxxxxx\nToken3xxxxxx' : 'Example:\nToken1xxxxxx\nToken2xxxxxx'}"
              spellcheck="false" style="direction:ltr;text-align:left">${state.rawTokensInput}</textarea>
    <div class="form-hint" data-t="hintToken"></div>
  </div>
  
  <div class="btn-group">
    <button class="btn btn-primary" id="btnValidate" onclick="handleValidate()" data-t="validate"></button>
    <button class="btn btn-secondary" onclick="goStep(1)" data-t="back"></button>
  </div>
</div>`;
}

async function handleValidate() {
  const tokenEl = document.getElementById('inpTokens');
  const alertEl = document.getElementById('credAlert');
  const btnEl = document.getElementById('btnValidate');

  state.rawTokensInput = tokenEl.value;
  const rawTokens = tokenEl.value.split('\n').map(t => t.trim()).filter(t => t);
  
  if (rawTokens.length === 0) {
    alertEl.innerHTML = alert('error', lang === 'fa' ? 'لطفاً حداقل یک API Token وارد کنید' : 'Please enter at least one token');
    return;
  }

  btnEl.disabled = true;
  btnEl.innerHTML = `<div class="spinner"></div> <span data-t="validatingTokens"></span>`;
  alertEl.innerHTML = '';
  state.accountsList = []; 

  let errorsHtml = '';
  
  for (let i = 0; i < rawTokens.length; i++) {
    const token = rawTokens[i];
    const acctsResult = await fetchAccounts(token);
    
    if (acctsResult.ok && acctsResult.accounts.length > 0) {
       const acct = acctsResult.accounts[0];
       state.accountsList.push({
           token: token,
           accountId: acct.id,
           accountName: acct.name || acct.id
       });
    } else {
       errorsHtml += `Token ${i + 1}: Invalid or no account access<br>`;
    }
  }

  if (errorsHtml) {
     alertEl.innerHTML = alert('error', errorsHtml);
     if (state.accountsList.length === 0) {
         btnEl.disabled = false;
         btnEl.textContent = t('validate');
         return;
     }
  }

  alertEl.innerHTML += alert('success', lang === 'fa' ? `${state.accountsList.length} اکانت تایید شد!` : `${state.accountsList.length} accounts verified!`);
  setTimeout(() => goStep(3), 1200);
}

function renderConfig() {
  return `
<div class="card step-panel">
  <div class="card-title" data-t="configTitle"></div>
  <div class="card-subtitle" data-t="configSub"></div>

  <div class="config-grid">
    <div class="form-group">

}

function handleConfigNext() {
  state.workerName = document.getElementById('inpWorker').value.trim() || 'nahan-core';
  state.dbName = document.getElementById('inpDB').value.trim() || 'iot_db';
  state.password = document.getElementById('inpPassword').value || 'admin';
  state.apiRoute = document.getElementById('inpRoute').value.trim() || 'sync';
  goStep(4);
}

function renderDeploy() {
  return `
<div class="card step-panel">
  <div class="card-title" data-t="deployTitle"></div>
  <div class="card-subtitle" data-t="deploySub"></div>

  <div id="deployAlert" style="margin-bottom:16px;"></div>

  <ul class="progress-list">
    <li class="progress-item waiting" id="prog-fetch">
      <span class="progress-icon">○</span>
      <div class="progress-text" data-t="stepFetch"></div>
    </li>
    <li class="progress-item waiting" id="prog-d1">
      <span class="progress-icon">○</span>
      <div class="progress-text" data-t="stepD1"></div>
    </li>
    <li class="progress-item waiting" id="prog-deploy">
      <span class="progress-icon">○</span>
      <div class="progress-text" data-t="stepDeploy"></div>
    </li>
    <li class="progress-item waiting" id="prog-verify">
      <span class="progress-icon">○</span>
      <div class="progress-text" data-t="stepVerify"></div>
    </li>
  </ul>

  <div class="btn-group" id="deployButtons" style="display:none">
    <button class="btn btn-secondary" onclick="goStep(3)" data-t="back"></button>
  </div>
</div>`;
}

function setProgress(id, status, textOverride) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `progress-item ${status}`;
  const icon = el.querySelector('.progress-icon');
  if (status === 'active') icon.innerHTML = '<div class="spinner"></div>';
  else if (status === 'done') icon.textContent = '✓';
  else if (status === 'error') icon.textContent = '✗';
  else icon.textContent = '○';
  
  if (textOverride) el.querySelector('.progress-text').textContent = textOverride;
}

async function runDeployment() {
  const alertEl = () => document.getElementById('deployAlert');
  const showBtns = () => { document.getElementById('deployButtons').style.display = 'flex'; };

  state.deployedPanels = []; 

  setProgress('prog-fetch', 'active');
  const fetchResult = await fetchWorkerCode();
  if (!fetchResult.ok) {
    setProgress('prog-fetch', 'error');
    alertEl().innerHTML = alert('error', t('errFetchAll'));
    showBtns();
    return;
  }
  setProgress('prog-fetch', 'done', `Source Fetched (v${state.workerVersion})`);

  let loopErrors = '';

  for (let i = 0; i < state.accountsList.length; i++) {
     const acc = state.accountsList[i];
     state.apiToken = acc.token;
     state.accountId = acc.accountId;

     alertEl().innerHTML = alert('info', lang === 'fa' ? `⏳ در حال نصب روی اکانت ${i + 1} از ${state.accountsList.length} (${esc(acc.accountName)})...` : `⏳ Deploying on Account ${i + 1}/${state.accountsList.length} (${esc(acc.accountName)})...`);
     
     // Reset step UI
     setProgress('prog-d1', 'active', t('stepD1'));
     setProgress('prog-deploy', 'waiting', t('stepDeploy'));
     setProgress('prog-verify', 'waiting', t('stepVerify'));

     const d1Result = await createD1Database();
     if (!d1Result.ok) {
        loopErrors += `Account ${i+1}: D1 Failed<br>`;
        setProgress('prog-d1', 'error');
        continue; 
     }
     setProgress('prog-d1', 'done');

     setProgress('prog-deploy', 'active');
     const deployResult = await deployWorker();
     if (!deployResult.ok) {
        loopErrors += `Account ${i+1}: Deploy Failed<br>`;
        setProgress('prog-deploy', 'error');
        continue;
     }
     setProgress('prog-deploy', 'done');

     setProgress('prog-verify', 'active');
     const urlResult = await enableWorkersDevUrl();
     if (urlResult.ok) {
        await new Promise(resolve => setTimeout(resolve, 2000)); // Sleep for propagation
        state.deployedPanels.push(`${state.deployUrl}/${state.apiRoute}/dash`);
        setProgress('prog-verify', 'done');
     } else {
        loopErrors += `Account ${i+1}: URL Failed<br>`;
        setProgress('prog-verify', 'error');
     }
  }

  if (loopErrors && state.deployedPanels.length === 0) {
      alertEl().innerHTML = alert('error', loopErrors);
      showBtns();
      return;
  }

  alertEl().innerHTML = alert('success', lang === 'fa' ? `✅ عملیات به پایان رسید.` : `✅ Batch deployment finished.`);
  setTimeout(() => goStep(5), 1500);
}

function renderSuccess() {
  const pass = state.password || 'admin';
  
  let linksHtml = state.deployedPanels.map((url, index) => `
     <div style="margin-bottom:10px;padding:8px;background:var(--bg4);border-radius:6px;display:flex;justify-content:space-between;align-items:center;">
       <a href="${esc(url)}" target="_blank" style="color:var(--cyan);text-decoration:none;word-break:break-all;font-size:0.9rem;">
          Proxy ${index + 1}: ${esc(url)}
       </a>
       <button class="btn btn-secondary btn-sm" onclick="copyText(this,'${esc(url)}')">${t('copy')}</button>
     </div>
  `).join('');

  return `
<div class="card step-panel">
  <div class="card-title" data-t="successTitle"></div>
  <div class="card-subtitle" data-t="successSub"></div>

  <div class="alert alert-warn">
    <span class="alert-icon">⚠️</span>
    <span>${lang === 'fa' ? 'لطفاً لینک‌های زیر را در کلاینت خود Load Balance کنید.' : 'Load balance the following links in your client.'}</span>
  </div>

  <div class="result-box">
    <div class="result-label" data-t="linksLabel"></div>
    <div style="margin-top:12px; max-height: 250px; overflow-y: auto;">
       ${linksHtml || '<span style="color:var(--red)">No successful deployments.</span>'}
    </div>
  </div>

  <div class="result-box" style="display:flex;justify-content:space-between;align-items:center">
    <div>
       <div class="result-label" data-t="passLabel"></div>
       <div class="result-value" style="color:var(--red)">${esc(pass)}</div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="copyText(this,'${esc(pass)}')">${t('copy')}</button>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" onclick="resetAll()" data-t="newInstall"></button>
  </div>
</div>`;
}

renderStep();
</script>
