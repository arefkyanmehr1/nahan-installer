<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dexter Panel | پنل هوشمند دکستر</title>
<style>
/* Base Variables & Upgraded Glassmorphism Theme */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #07070a;
  --bg2: rgba(18, 18, 26, 0.75);
  --bg3: rgba(26, 26, 38, 0.85);
  --bg4: rgba(34, 34, 58, 0.9);
  --text: #e2e2ec;
  --text2: #9a9ab0;
  --text3: #62627a;
  --cyan: #e53935;
  --cyan2: #c62828;
  --cyan-bg: rgba(229, 57, 53, 0.12);
  --green: #00e676;
  --green-bg: rgba(0, 230, 118, 0.08);
  --red: #ff4466;
  --red-bg: rgba(255, 68, 102, 0.08);
  --yellow: #ffaa00;
  --yellow-bg: rgba(255, 170, 0, 0.08);
  --purple: #e53935;
  --border: rgba(255, 255, 255, 0.06);
  --border2: rgba(255, 255, 255, 0.12);
  --radius: 12px;
  --radius2: 16px;
  --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  line-height:1.7;-webkit-font-smoothing:antialiased;
  background-image: radial-gradient(circle at 10% 20%, rgba(229, 57, 53, 0.05) 0%, transparent 40%),
                    radial-gradient(circle at 90% 80%, rgba(229, 57, 53, 0.03) 0%, transparent 40%);
  background-attachment: fixed;
}
body.ltr{direction:ltr}
body.rtl{direction:rtl}

/* Core Layout Structures */
.app-layout {
  display: flex;
  min-height: 100vh;
  width: 100%;
}

/* Sidebar Styling */
.sidebar {
  width: 260px;
  background: var(--bg2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  gap: 8px;
  transition: var(--transition);
  z-index: 90;
  flex-shrink: 0;
}
body.rtl .sidebar {
  border-right: none;
  border-left: 1px solid var(--border);
}

.brand-section {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 12px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.brand-logo {
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--cyan);
  letter-spacing: 2px;
}
.brand-badge {
  background: var(--cyan-bg);
  color: var(--cyan);
  font-size: 0.7rem;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid rgba(229,57,53,0.2);
}

.nav-menu {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  color: var(--text2);
  text-decoration: none;
  border-radius: var(--radius);
  font-size: 0.92rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  border: 1px solid transparent;
}
.nav-item:hover {
  background: var(--cyan-bg);
  color: var(--cyan);
  border-color: rgba(229, 57, 53, 0.15);
}
.nav-item.active {
  background: var(--cyan);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(229, 57, 53, 0.25);
}

.sidebar-footer {
  padding: 16px 12px 0;
  border-top: 1px solid var(--border);
  font-size: 0.78rem;
  color: var(--text3);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* Main Content Area */
.main-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Topbar Header */
.topbar {
  height: 70px;
  background: var(--bg2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 80;
}
.topbar-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* Content Pane Container */
.content-pane {
  padding: 32px;
  flex: 1;
  overflow-y: auto;
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
}

/* Auth / Login Container */
.auth-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.auth-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg2);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 40px 32px;
  box-shadow: var(--shadow);
}

/* Tables and Grid Components */
.panel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}
.metric-card {
  background: var(--bg2);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: var(--transition);
}
.metric-card:hover {
  transform: translateY(-2px);
  border-color: rgba(229, 57, 53, 0.2);
}
.metric-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.metric-label {
  font-size: 0.85rem;
  color: var(--text2);
}
.metric-value {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--text);
}
.metric-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--cyan-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cyan);
  font-size: 1.4rem;
}

/* Complex UI Tables */
.table-container {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: hidden;
  margin-bottom: 32px;
}
.table-header-bar {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}
.table-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}
.table-responsive {
  width: 100%;
  overflow-x: auto;
}
.table-custom {
  width: 100%;
  border-collapse: collapse;
  text-align: right;
}
body.ltr .table-custom {
  text-align: left;
}
.table-custom th {
  padding: 14px 24px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
}
.table-custom td {
  padding: 16px 24px;
  font-size: 0.9rem;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.table-custom tr:last-child td {
  border-bottom: none;
}
.table-custom tr:hover td {
  background: rgba(255,255,255,0.01);
}

/* Action Buttons & Utilities */
.btn-action {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  transition: var(--transition);
}
.btn-action:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}
.btn-action.delete:hover {
  border-color: var(--red);
  color: var(--red);
  background: var(--red-bg);
}

/* Modal Windows */
.modal-overlay {
  position: fixed;
  top: 0;left: 0;right: 0;bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: var(--transition);
}
.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}
.modal-card {
  width: 100%;
  max-width: 540px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 32px;
  box-shadow: var(--shadow);
  transform: scale(0.9);
  transition: var(--transition);
}
.modal-overlay.active .modal-card {
  transform: scale(1);
}

/* Original Installer Classes Integrated Adaptively */
.container{width:100%;max-width:720px;padding:0;margin:0 auto}
.card{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);
  padding:32px;box-shadow:var(--shadow);transition:var(--transition);
  margin-top: 16px;
}
.card-title{font-size:1.35rem;font-weight:700;margin-bottom:6px;color:var(--cyan)}
.card-subtitle{color:var(--text2);font-size:.9rem;margin-bottom:24px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:.85rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-input{
  width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:.95rem;
  font-family:var(--font);transition:var(--transition);outline:none
}
.form-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(229,57,53,.15)}
.form-hint{font-size:.78rem;color:var(--text3);margin-top:4px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 28px;border-radius:var(--radius);font-size:.95rem;
  font-weight:600;cursor:pointer;border:none;transition:var(--transition);
  font-family:var(--font)
}
.btn-primary{background:var(--cyan);color:#fff;box-shadow:0 2px 12px rgba(229, 57, 53, .3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(229, 57, 53, .35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-group{display:flex;gap:12px;margin-top:28px}
[dir=ltr] .btn-group{flex-direction:row-reverse}
.btn-sm{padding:8px 18px;font-size:.85rem}

.steps{display:flex;justify-content:center;gap:6px;margin-bottom:32px}
.step-dot{
  width:10px;height:10px;border-radius:50%;background:var(--bg4);
  border:2px solid var(--border);transition:var(--transition);
}
.step-dot.active{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(229,57,53,.4)}
.step-dot.done{background:var(--green);border-color:var(--green)}

/* Search inputs, status tags, responsive design modifications */
.search-input {
  max-width: 280px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  outline: none;
  font-size: 0.9rem;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 600;
}
.status-badge.active { background: var(--green-bg); color: var(--green); border: 1px solid rgba(0, 230, 118, 0.15); }
.status-badge.inactive { background: var(--red-bg); color: var(--red); border: 1px solid rgba(255, 68, 102, 0.15); }

/* Code Block */
.code-block {
  background: #0d0d14; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 18px; font-family: var(--font-mono); font-size: .85rem;
  color: var(--text); overflow-x: auto; margin: 12px 0; line-height: 1.6;
  direction: ltr; text-align: left; position: relative;
}
.code-block .copy-btn { position: absolute; top: 8px; right: 8px; }
[dir=ltr] .code-block .copy-btn { right: auto; left: 8px; }

/* Alerts */
.alert{
  padding:14px 18px;border-radius:var(--radius);font-size:.88rem;
  margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;
  line-height:1.6
}
.alert-info{background:var(--cyan-bg);border:1px solid rgba(229,57,53,.2);color:var(--cyan)}
.alert-success{background:var(--green-bg);border:1px solid rgba(0,230,118,.2);color:var(--green)}
.alert-error{background:var(--red-bg);border:1px solid rgba(255,68,102,.2);color:var(--red)}
.alert-warn{background:var(--yellow-bg);border:1px solid rgba(255,170,0,.2);color:var(--yellow)}
.alert-icon{font-size:1.1rem;flex-shrink:0;line-height:1.5}

/* Progress */
.progress-list{list-style:none;margin:8px 0}
.progress-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-radius:var(--radius);margin-bottom:8px;
  background:var(--bg3);border:1px solid var(--border);
  transition:var(--transition)
}
.progress-item.active{border-color:var(--cyan);background:var(--cyan-bg)}
.progress-item.done{border-color:var(--green);background:var(--green-bg)}
.progress-item.error{border-color:var(--red);background:var(--red-bg)}
.progress-item.waiting{opacity:.5}
.progress-icon{font-size:1.1rem;flex-shrink:0;width:24px;text-align:center}
.progress-text{flex:1;font-size:.9rem}
.progress-detail{font-size:.78rem;color:var(--text2);margin-top:2px}

/* Spinner */
.spinner{
  width:18px;height:18px;border:2px solid var(--border2);
  border-top-color:var(--cyan);border-radius:50%;
  animation:spin .8s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Result Card */
.result-box{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:12px
}
.result-label{font-size:.8rem;color:var(--text2);margin-bottom:4px}
.result-value{
  font-family:var(--font-mono);font-size:1.05rem;color:var(--cyan);
  word-break:break-all;display:flex;align-items:center;gap:10px
}
.copy-btn{
  background:var(--bg4);border:1px solid var(--border);color:var(--text2);
  padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;
  transition:var(--transition);flex-shrink:0
}
.copy-btn:hover{color:var(--cyan);border-color:var(--cyan)}
.copy-btn.copied{color:var(--green);border-color:var(--green)}

/* Connectivity Test */
.conn-status{
  display:flex;align-items:center;gap:12px;padding:16px 20px;
  border-radius:var(--radius);margin:16px 0;font-size:.95rem
}
.conn-testing{background:var(--cyan-bg);border:1px solid rgba(229,57,53,.2)}
.conn-ok{background:var(--green-bg);border:1px solid rgba(0,230,118,.2)}
.conn-fail{background:var(--red-bg);border:1px solid rgba(255,68,102,.2)}

/* Steps List */
.steps-list{list-style:none;counter-reset:step;margin:16px 0}
.steps-list li{
  counter-increment:step;padding:10px 14px 10px 44px;position:relative;
  font-size:.9rem;color:var(--text2);margin-bottom:6px;
  background:var(--bg3);border-radius:8px;line-height:1.5
}
[dir=ltr] .steps-list li{padding:10px 44px 10px 14px}
.steps-list li::before{
  content:counter(step);position:absolute;left:14px;top:10px;
  width:22px;height:22px;border-radius:50%;background:var(--cyan-bg);
  color:var(--cyan);font-size:.78rem;font-weight:700;
  display:flex;align-items:center;justify-content:center
}
[dir=ltr] .steps-list li::before{left:auto;right:14px}
.steps-list a{color:var(--cyan)}

/* Permissions List */
.perm-list{list-style:none;margin:12px 0}
.perm-item{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--bg3);border-radius:8px;margin-bottom:6px;font-size:.9rem
}
.perm-icon{color:var(--cyan);font-size:1rem;flex-shrink:0}

/* Welcome Features */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
@media(max-width:520px){.feature-grid{grid-template-columns:1fr;gap:10px}.feature-item{padding:12px}}
.feature-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  font-size:.88rem;transition:var(--transition)
}
.feature-item:hover{border-color:var(--cyan);background:var(--cyan-bg)}
.feature-icon{font-size:1.2rem;flex-shrink:0}

/* Mobile Header */
.mobile-header {
  display: none;
  height: 60px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}
.menu-toggle {
  background: none;
  border: none;
  color: var(--text);
  font-size: 1.5rem;
  cursor: pointer;
}

@media (max-width: 768px) {
  .app-layout { flex-direction: column; }
  .sidebar {
    position: fixed;
    top: 60px; left: 0; bottom: 0;
    width: 260px;
    transform: translateX(-100%);
    box-shadow: var(--shadow);
  }
  body.rtl .sidebar {
    left: auto; right: 0;
    transform: translateX(100%);
  }
  .sidebar.active { transform: translateX(0); }
  .mobile-header { display: flex; }
  .topbar { display: none; }
  .content-pane { padding: 20px 16px; }
  .panel-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// Toast notification utility
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer') || (() => {
    const c = document.createElement('div');
    c.id = 'toastContainer';
    c.style.position = 'fixed';
    c.style.bottom = '24px';
    c.style.right = '24px';
    c.style.zIndex = '9999';
    c.style.display = 'flex';
    c.style.flexDirection = 'column';
    c.style.gap = '10px';
    document.body.appendChild(c);
    return c;
  })();

  const t = document.createElement('div');
  t.style.background = type === 'success' ? 'var(--green-bg)' : type === 'error' ? 'var(--red-bg)' : 'var(--cyan-bg)';
  t.style.border = `1px solid ${type === 'success' ? 'var(--green)' : type === 'error' ? 'var(--red)' : 'var(--cyan)'}`;
  t.style.color = type === 'success' ? 'var(--green)' : type === 'error' ? 'var(--red)' : 'var(--cyan)';
  t.style.padding = '12px 24px';
  t.style.borderRadius = '8px';
  t.style.fontSize = '0.9rem';
  t.style.fontWeight = '600';
  t.style.boxShadow = 'var(--shadow)';
  t.style.backdropFilter = 'blur(8px)';
  t.style.animation = 'fadeIn 0.25s ease';
  t.textContent = message;

  container.appendChild(t);
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.5s ease';
    setTimeout(() => t.remove(), 500);
  }, 3000);
}

// Global logger helper
function logAction(type, msg) {
  state.logs.unshift({
    timestamp: new Date().toISOString(),
    type: type,
    message: msg
  });
  // Limit to last 100 logs
  if (state.logs.length > 100) state.logs.pop();
  localStorage.setItem('dexter_logs', JSON.stringify(state.logs));
}

// Translate helper
function t(key) {
  const entry = T[key];
  if (!entry) return key;
  if (typeof entry === 'string') return entry;
  return entry[state.lang] || entry.en || key;
}

async function runLatencyTestAll() {
  showToast(state.lang === 'fa' ? 'در حال پینگ گرفتن از نودها...' : 'Testing gateway latencies...');
  for (const n of state.nodes) {
    const el = document.getElementById(`lat-${n.id}`);
    if (el) el.innerHTML = '<div class="spinner"></div>';
    
    // Simulate real network delay test
    await new Promise(resolve => setTimeout(resolve, 400 + Math.random() * 400));
    const simulatedLat = Math.floor(80 + Math.random() * 150) + 'ms';
    n.latency = simulatedLat;
    if (el) el.innerHTML = `<span class="badge badge-green">${simulatedLat}</span>`;
  }
  localStorage.setItem('dexter_nodes', JSON.stringify(state.nodes));
}

function clearLocalLogs() {
  state.logs = [];
  localStorage.setItem('dexter_logs', JSON.stringify(state.logs));
  showToast(state.lang === 'fa' ? 'لاگ‌ها پاک شدند' : 'Logs cleared successfully');
  renderTabContent();
}

// ── VIEW: DYNAMIC SUBSCRIPTIONS LINK AGGREGATOR ──
function viewSubscriptions() {
  const firstUser = state.users[0] || { name: 'Client', uuid: 'your-uuid-goes-here', protocol: 'VLESS' };
  const firstNode = state.nodes[0] || { url: 'https://nahan-core.test.workers.dev' };
  
  const sampleSubUrl = `${firstNode.url}/sync/sub?key=${firstUser.uuid}`;

  const vlessConfigs = state.nodes.map(n => {
    const host = new URL(n.url).hostname;
    return `vless://${firstUser.uuid}@${host}:443?encryption=none&security=tls&sni=${host}&fp=chrome&type=ws&host=${host}&path=%2F#Dexter-${n.name}`;
  }).join('\\n');

  return `
    <div class="card">
      <div class="card-title" data-t="lblDynamicSub"></div>
      <div class="card-subtitle" data-t="lblSubDesc"></div>

      <div class="form-group">
        <label class="form-label">${state.lang === 'fa' ? 'کاربر انتخاب شده' : 'Target User Profile'}</label>
        <select class="form-input" id="subSelectUser" onchange="updateDynamicSubPreview()">
          ${state.users.map(u => `<option value="${u.uuid}" data-proto="${u.protocol}">${esc(u.name)} (${u.protocol})</option>`).join('')}
        </select>
      </div>

      <div class="result-box">
        <div class="result-label" data-t="lblDynamicSub"></div>
        <div class="result-value">
          <span id="subLinkPreview" style="font-size:0.85rem">${esc(sampleSubUrl)}</span>
          <button class="copy-btn" onclick="copyText(this, document.getElementById('subLinkPreview').textContent)">${state.lang === 'fa' ? 'کپی' : 'Copy'}</button>
        </div>
      </div>

      <div class="divider" style="height:1px;background:var(--border);margin:20px 0"></div>

      <div style="font-weight:600;margin-bottom:10px;font-size:0.95rem">${state.lang === 'fa' ? 'پیکربندی کلاینت (v2ray / Sing-box)' : 'Client Node Config URIs'}</div>
      <textarea class="form-input" id="rawConfigsArea" readonly rows="6" style="font-family:var(--font-mono);font-size:0.8rem;background:#0d0d14;color:#a0a0c0;resize:none">${esc(vlessConfigs)}</textarea>
      <div style="margin-top:12px;display:flex;justify-content:flex-end">
        <button class="btn btn-secondary btn-sm" onclick="copyText(this, document.getElementById('rawConfigsArea').value)">${state.lang === 'fa' ? 'کپی همه‌ پیکربندی‌ها' : 'Copy All URIs'}</button>
      </div>
    </div>
  `;
}

function updateDynamicSubPreview() {
  const select = document.getElementById('subSelectUser');
  const preview = document.getElementById('subLinkPreview');
  const rawArea = document.getElementById('rawConfigsArea');
  
  if (!select || !preview) return;
  const uuid = select.value;
  const opt = select.options[select.selectedIndex];
  const proto = opt.getAttribute('data-proto') || 'VLESS';
  const firstNode = state.nodes[0] || { url: 'https://nahan-core.test.workers.dev' };
  
  const newUrl = `${firstNode.url}/sync/sub?key=${uuid}`;
  preview.textContent = newUrl;

  const generated = state.nodes.map(n => {
    const host = new URL(n.url).hostname;
    if (proto === 'VLESS') {
      return `vless://${uuid}@${host}:443?encryption=none&security=tls&sni=${host}&fp=chrome&type=ws&host=${host}&path=%2F#Dexter-${n.name}`;
    } else {
      return `trojan://${uuid}@${host}:443?security=tls&sni=${host}&fp=chrome&type=ws&host=${host}&path=%2F#Dexter-${n.name}`;
    }
  }).join('\\n');

  rawArea.value = generated;
}

const D1_MIGRATION_SQL = `-- Dexter / Nahan Core Database Schema Setup
-- Run these queries inside your Cloudflare D1 Console to prepare database tables.

CREATE TABLE IF NOT EXISTS users (
  id TEXT PRIMARY KEY,
  username TEXT NOT NULL,
  uuid TEXT UNIQUE NOT NULL,
  password TEXT,
  traffic_limit INTEGER DEFAULT 100,
  traffic_usage REAL DEFAULT 0,
  expiry TEXT,
  status TEXT DEFAULT 'Active',
  protocol TEXT DEFAULT 'VLESS',
  created_at DATETIME DEFAULT CURRENT_TIMESTAMP
);

CREATE TABLE IF NOT EXISTS tokens (
  id TEXT PRIMARY KEY,
  name TEXT,
  account_id TEXT NOT NULL,
  token TEXT NOT NULL,
  status TEXT DEFAULT 'Active'
);

CREATE TABLE IF NOT EXISTS nodes (
  id TEXT PRIMARY KEY,
  name TEXT NOT NULL,
  url TEXT NOT NULL,
  account_id TEXT,
  db_name TEXT,
  db_id TEXT,
  status TEXT DEFAULT 'Online',
  last_sync DATETIME DEFAULT CURRENT_TIMESTAMP
);

CREATE TABLE IF NOT EXISTS logs (
  id INTEGER PRIMARY KEY AUTOINCREMENT,
  timestamp DATETIME DEFAULT CURRENT_TIMESTAMP,
  type TEXT,
  message TEXT
);

CREATE TABLE IF NOT EXISTS settings (
  key TEXT PRIMARY KEY,
  value TEXT
);`;
